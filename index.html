<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вакансии — Восточная Горнорудная Компания</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
.header{background:#0a0a0a;padding:48px 20px 40px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(220,38,38,.08) 0%,transparent 50%,rgba(251,146,60,.05) 100%)}
.header-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:40px;justify-content:center}
.logo-text{font-size:1em;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.header h1{font-size:2.8em;text-align:center;font-weight:900;letter-spacing:-.02em;line-height:1.1;text-transform:uppercase;margin-bottom:12px}
.header h1 span{color:#ef4444}
.header p{font-size:1.05em;color:rgba(255,255,255,.6);text-align:center}
.header .count{display:inline-block;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);padding:6px 18px;border-radius:4px;margin-top:16px;font-size:.9em;font-weight:600;color:#ef4444}.header .count-wrap{text-align:center}
.filters{max-width:1200px;margin:0 auto;padding:20px 20px 0;display:flex;gap:10px;flex-wrap:wrap}
.filters select,.filters input{padding:10px 14px;border:1px solid rgba(255,255,255,.12);border-radius:6px;font-size:.9em;background:#1a1a1a;color:#fff;min-width:180px;font-family:inherit}
.filters select:focus,.filters input:focus{outline:none;border-color:rgba(239,68,68,.5)}
.filters input{flex:1;min-width:220px}
.filters .reset{padding:10px 18px;border:1px solid rgba(239,68,68,.4);border-radius:6px;background:transparent;color:#ef4444;cursor:pointer;font-size:.9em;font-family:inherit;font-weight:600}
.filters .reset:hover{background:rgba(239,68,68,.15)}
.counter{max-width:1200px;margin:0 auto;padding:12px 20px;font-size:.85em;color:rgba(255,255,255,.4)}
.jobs{max-width:1200px;margin:0 auto;padding:0 20px 60px}
.job-card{background:#141414;border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:24px;margin-bottom:12px;cursor:pointer;transition:all .2s}
.job-card:hover{border-color:rgba(239,68,68,.2);background:#1a1a1a}
.job-card h2{font-size:1.1em;font-weight:700;margin-bottom:8px}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.tag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:.78em;font-weight:600}
.tag-entity{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.tag-cat{background:rgba(251,146,60,.12);color:#fb923c;border:1px solid rgba(251,146,60,.2)}
.tag-city{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1)}
.tag-schedule{background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.08)}
.info-row{display:flex;gap:24px;flex-wrap:wrap;margin-top:6px;font-size:.85em;color:#fff}
.info-row .label{color:rgba(255,255,255,.6);font-weight:500}
.demand{font-size:.85em;color:rgba(255,255,255,.4);margin-top:4px}
.details{display:none;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,.08)}
.details.open{display:block}
.details h3{font-size:.85em;font-weight:700;color:#ef4444;text-transform:uppercase;letter-spacing:.05em;margin:20px 0 8px}
.details .desc{font-size:.9em;line-height:1.7;color:rgba(255,255,255,.7)}
.details .desc *{font-style:normal!important;font-family:inherit!important;font-size:inherit!important;color:inherit!important}
.details .desc strong{font-weight:600;color:rgba(255,255,255,.9)}
.details .desc ul{margin:8px 0 8px 20px}
.details .desc ul li{margin-bottom:4px;list-style-type:disc}
.details .desc p{margin-bottom:8px}
.rec-intro{margin-top:16px;font-size:.88em;color:rgba(255,255,255,.45);font-style:italic}
.recruiter{margin-top:8px;padding:14px 18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;display:flex;align-items:center;gap:12px;font-size:.9em}
.recruiter .name{font-weight:600}
.recruiter a{color:#f87171;text-decoration:none}
.recruiter a:hover{text-decoration:underline}
.links{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
.links a{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:6px;text-decoration:none;font-size:.9em;font-weight:600;font-family:inherit}
.links a.hh{background:#dc2626;color:#fff}.links a.hh:hover{background:#b91c1c}
.links a.career{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15)}
.links a.other{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.skills{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.skill{padding:3px 10px;border-radius:4px;font-size:.78em;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5)}
.no-results{text-align:center;padding:80px 20px;color:rgba(255,255,255,.3);font-size:1.1em}
.updated{max-width:1200px;margin:0 auto;padding:4px 20px 20px;font-size:.8em;color:rgba(255,255,255,.2);text-align:right}
@media(max-width:600px){.filters{flex-direction:column}.filters select,.filters input{min-width:100%;width:100%}.header h1{font-size:1.8em}.info-row{flex-direction:column;gap:4px}}
</style></head><body>

asted\"><strong>Основные задачи</strong></p><p><strong>1. Управление и развитие подразделения</strong></p><ul type=\"disc\"><li>Руководство отделом (земельные отношения, лесной блок, экология и недропользование, страхование).</li><li>Формирование приоритетов, индивидуальных планов сотрудников.</li><li>Наставничество, развитие компетенций, распределение функционала и контроль исполнения задач.</li><li>Ведение регулярных планёрок, отчётности и аналитики по направлениям деятельности.</li><li>Формирования стратегии развития отдела, управление рисками</li></ul><p><strong>2. Оптимизация бизнес-процессов</strong></p><ul type=\"disc\"><li>Диагностика текущих процессов и «узких мест» в цепочке оформления земельных, экологических и недропользовательских документов.</li><li>Разработка и реализация карты улучшений бизнес-процессов по результатам их анализа</li><li>Разработка и внедрение цифровых инструментов учёта и контроля (реестр разрешений, карта земельных активов, электронные дашборды сроков и рисков).</li><li>Перевод взаимодействия с контрагентами и госорганами в электронный формат (АСУ-РН, ГИС ЕГРН, ГИСН, ФГИС «Недра», платформы Минприроды и Рослесхоза).</li><li>Автоматизация контроля сроков лицензий, разрешений, проверок (в том числе с напоминаниями и статусами).</li><li>Внедрение регламентов SLA по взаимодействию отдела с другими подразделениями компании, кросс-функциональное взаимодействие.</li><li>Координация взаимодействия отдела с другими подразделениями юридического департамента.</li><li>Разработка и внедрение внутренних регламентов, инструкций и стандартов отдела.</li><li>Участие в инвестиционных и инфраструктурных проектах</li></ul><p><strong>3. Экология и недропользование</strong></p><ul type=\"disc\"><li>Правовая экспертиза и сопровождение пакетов документов по лицензии (разведка/добыча, изменение границ, постановка запасов, горный отвод, технические проекты с согласованием в ЦКР). Контроль за соответствие разрешительных документов требованиям в сфере недропользования и промбезопасности.</li><li>Взаимодействие с Роснедрами, Росгеологэкспертизой, Ростехнадзором, Росприроднадзор. Участие в согласованиях с региональными властями.</li><li>Сопровождение экологических проектов (решения по водным объектам, перенос русел рек, размещение отвалов, лесовосстановление, рекультивация и др.).&nbsp;</li><li>Взаимодействие с Росрыболовством и другими надзорными органами при согласовании проектных решений.</li></ul><p><strong>4. Землепользование и недвижимость</strong></p><ul type=\"disc\"><li>Оформление прав на земельные участки под производственные и инфраструктурные объекты, включая перевод земель сельхозназначения в промышленность</li><li>Опыт корректировки и согласования генпланов, ПЗЗ, схем территориального планирования и иных градостроительных документов</li></ul><ul><li>Кадастровые и регистрационные процедуры, включая сделки с недвижимостью, взаимодействие с Росреестром, Роскадастром и муниципальными органами.</li><li>Правовая поддержка проектов капитального и некапитального строительства: контроль разрешений (РНС, РНВ, ЗОС, ГЭ, ГПЗУ), участие в согласовании проектной документации (ГИСН, экспертиза, муниципалитет)</li></ul><p><strong>5. Контроль рисков и проверок, защита интересов&nbsp;</strong></p><ul type=\"disc\"><li>Формирование и регулярное обновление матрицы рисков по экологии, земле, недрам.</li><li>Контроль выполнения предписаний надзорных органов.</li><li>Взаимодействие с прокуратурой, Росприроднадзором, Минприроды, Ростехнадзором, Росреестром, администрацией, и иными органами.</li><li>Подготовка команды и документов при проведении проверок и их сопровождение</li><li>Представление компании в судах по вопросам экологии, земли, лицензий.</li></ul>", "requirements": "<ul type=\"disc\" id=\"isPasted\"><li>Высшее юридическое образование (не ниже специалитета).</li><li>Дополнительное образование в сфере земельно-имущественных отношений, недропользования, экологии — преимущество.</li><li>Опыт не менее <strong>5 лет в сфере земе довых документов.</p><p>Контроль за соблюдением трудовой дисциплины, правил и норм по охране труда, технике безопасности, производственной санитарии и пожарной безопасности, требований надзорных органов.</p><p>Взаимодействие с административными и коммерческими службами, администрациями морских портов, судовыми агентами, таможенными органами и другими участниками грузооборота.</p><p>Участие в составлении бюджета финансирования эксплуатации и ремонта флота</p><p>Ключевыми задачами являются максимизация эффективности флота, минимизация простоев и соблюдение требований безопасности и экологии.</p>", "requirements": "<p>Смотреть из капитанов.</p><p>Наличие высшего технического образования в области торгового мореплавания и стажа работы в качестве члена экипажа морского судна на уровне управления (капитан, старший помощник капитана, старший механик) не менее 3 лет или опыт по управлению работой флота не менее 3 лет на судах более 5000.</p>", "entity": "ООО \"УМПШ\"", "category": "Руководитель", "city": "Шахтерск", "schedule": "Полный день", "experience": "3-6 лет", "demand": 1, "links": [{"url": "https://hh.ru/vacancy/130797641", "type": "Headhunter"}], "key_skills": [], "recruiter": "Сидоренко Татьяна Владимировна", "recruiter_email": "sidorenkotv@eastmining.ru", "department": "Портофлот", "director": "Герасименко Петр Владимирович"}, {"id": 1522146, "name": "Инженер-технолог", "description": "", "responsibilities": "<p>- Разрабатывать и вести технологическую документацию по ремонту, содержанию и проектированию дорог.<br>\n<ul>\n<li>Составлять паспорта автодорог, мероприятия для устранения замечаний.</li>\n<li>Своевременно и качественно выполнять процессы по проектированию и планированию дорожных работ в применяемом Civil 3D и сопутствующем ПО.</li>\n<li>Взаимодействовать с другими отделами и службами для выполнения обязанностей согласно настоящей инструкции.</p><p>- Вести анализ фактических направлений дорожных работ, ежедекадно сопоставлять с плановыми направлениями.</p><p></li>\n</ul>\n</p><p><br>\n</p>", "requirements": "<p id=\"isPasted\">Образование: Высшее, Среднее - специальное.</p><p>Дополнительная квалификация:</p><p>Опыт работы: можно без опыта, при условии владения программными продуктами.</p>", "entity": "ООО \"СУР\"", "category": "ИТР", "city": "Шахтерск", "schedule": "Вахта", "experience": "Без опыта", "demand": 1, "links": [{"url": "https://hh.ru/vacancy/131362013", "type": "Headhunter"}], "key_skills": [], "recruiter": "Данцева Александра Юрьевна", "recruiter_email": "dantsevaay@eastmining.ru", "department": "Служба заместителя директора по производству", "director": "Разборов Илья Вячеславович"}, {"id": 1523852, "name": "Управляющий пекарней", "description": "", "responsibilities": "<table border=\"0\" cellspacing=\"0\" cellpadding=\"0\" width=\"1164\" id=\"isPasted\"><tbody><tr><td><p><strong>Операционное управление</strong></p></td><td><p>Организация ритмичного выпуска продукции требуемого ассортимента и качества. Контроль за соблюдением технологических процессов и норм закладки сырья. Обеспечение разнообразия ассортимента на основе изучения спроса. Взаимодействие с надзорными органами.</p></td></tr><tr><td><p><strong>Финансовый контроль и закупки</strong></p></td><td><p>Контроль за себестоимостью, нормой складских запасов. Калькуляция изделий и ценообразование. Работа с поставщиками, оценка выгодности закупа (фудкост). Составление заявок на сырье и материалы. Бюджетирование и анализ выполнения плана по операционной прибыли. Контроль реализации и остатков в магазинах, проведение инвентаризаций. Работа с поставщиками, планирование, организация, хранение.</p></td></tr><tr><td><p><strong>Управление персоналом</strong></p></td><td><p>Распределение обязанностей среди сотрудников, контроль соблюдения трудовой дисциплины. Проведение инструктажей (вводный, первичный, по ТБ). Обучение и повышение квалификации команды. Создание и поддержание позитивного морально-психологического климата в коллективе. Проводить собеседование, адаптацию персонала, ротация по процессам. Графики отпусков, табель рабочего времени.</p></td></tr><tr><td><p><strong>Контроль качества и безопасности</strong></p></td><td><p>Органолептическая оценка качества сырья и полуфабрикатов. Контроль соблюдения санитарных правил и норм личной гигиены. Обеспечение прохождения персоналом медосмотров. Контроль за соблюдением правил охраны труда и техники безопасности. Ведение санитарных журналов и ведение санитарного контроля в пекарни.</p></td></tr><tr><td><p><strong>Развитие и отчетность</strong></p></td><td><p>Внедрение прогрессивных технологий и стандартов компании для повышения эффективности и качества. Информирование руководства о состоянии дел, фактах, влияющих на прибыль и репутацию. Работа по увеличению объемов производства и прибыли. Работа в направлении открытия дополнительных точек реализации.</p></td></tr></tbody></table>", "requirements": "<p><br>\n</p><p>Образование: Высшее профессиональное</p><p>Дополнительная квалификация:</p><p>Опыт работы: 3 года</p>", "entity": "ООО \"ВГК Сервис\"", "category": "Руководитель", "city": "Шахтерск", "schedule": "Полный день", "experience": "3-6 лет", "demand": 1, "links": [{"url": "https://hh.ru/vacancy/131128261", "type": "Headhunter"}], "key_skills": [], "recruiter": "Данилова Галина Геннадьевна", "recruiter_email": "danilovagg@eastmining.ru", "department": "ООО \"Шахтерская пекарня №1\"", "director": "Лысенко Илья Русланович"}, {"id": 1526134, "name": "Грузчик Фабрика Кухни", "description": "", "responsibilities": "<p>Разгрузка и погрузка товара.</p>", "requirements": "<table width=\"695\" class=\"\"><tr><td><p><br>\n</p></td></tr></table><p><br>\n</p><p><br>\n</p><p><br>\n</p><p>грузчик 30/30</p>", "entity": "ООО \"ВГК Сервис\"", "category": "Рабочий", "city": "Шахтерск", "schedule": "Вахта", "experience": "Без опыта", "demand": 6, "links": [{"url": "https://hh.ru/vacancy/126647713", "type": "Headhunter"}, {"url": "https://emco.potok.io/open/jobs/1526134", "type": "Career"}], "key_skills": [], "recruiter": "Будницкая Юлия", "recruiter_email": "budnitskayayuv@eastmining.ru", "department": "Блок заместителя исполнительного директора по проектам общественного питания и торговли", "director": "Забоцкий Андрей Михайлович"}, {"id": 1528008, "name": "Электрогазосварщик, занятый на резке и ручной сварке 5 разряда", "description": "", "responsibilities": "<p>Ответственно выполнять ручную дуговую сварку, газовую и кислородную резку сложных конструкций, узлов из легированных, высокоуглеродистых сталей и чугуна. Осуществлять сварку узлов буровых установок на базе Камаз 43118 и Санвард 250, работающих при больших динамических нарузках. <br id=\"isPasted\"><br>\n<br id=\"isPasted\"><br>\n</p>", "requirements": "<p>Образование:</p><p>Дополнительная квалификация:</p><p>Опыт работы:</p>", "entity": "ООО «ВГК БВР»", "category": "Рабочий", "city": "Углегорск", "schedule": "Вахта", "experience": "1-3 года", "demand": 1, "links": [], "key_skills": [], "recruiter": "Шлихтемайер Лариса Юрьевна", "recruiter_email": "shlikhtemayerly@eastmining.ru", "department": "Участок АРМ", "director": "Крумер Евгений Ефимович"}, {"id": 1528009, "name": "Слесарь по обслуживанию и ремонту оборудования 5 разряда", "description": "", "responsibilities": "<p id=\"isPasted\">Монтаж, демонтаж, ремонт, наладка, техническое обслуживание механической части машин, узлов и механизмов, аппаратуры. Техническое обслуживание, ремонт автомобилей на базе Камаз.</p><p>Буровые установки на базе автомобилей КАМАЗ. Шасси 43-118, 65-222</p>", "requirements": "<p>Образование:</p><p>Дополнительная квалификация:</p><p>Опыт работы:</p>", "entity": "ООО «ВГК БВР»", "category": "Рабочий", "city": "Углегорск", "schedule": "Вахта", "experience": "1-3 года", "demand": 2, "links": [], "key_skills": [], "recruiter": "Шлихтемайер Лариса Юрьевна", "recruiter_email": "shlikhtemayerly@eastmining.ru", "department": "Участок АРМ", "director": "Крумер Евгений Ефимович"}, {"id": 1528239, "name": "Начальник цеха по ремонту электрических машин", "description": "", "responsibilities": "<p id=\"isPasted\">1.  Управление персоналом:</p><p>∙  Руководство, координация и распределение задач между электромонтерами и другим персоналом цеха.</p><p>∙  Организация обучения, стажировки и аттестации персонала, повышение квалификации.</p><p>∙  Контроль соблюдения трудовой дисциплины и правил внутреннего распорядка.</p><p>∙  Подбор и подготовка резерва кадров.</p><p>2.  Техническое обеспечение и эксплуатация:</p><p>∙  Обеспечение бесперебойного и экономичного снабжения электроэнергией всех подразделений предприятия.</p><p>∙  Организация технического обслуживания и ремонта электрооборудования (включая ППР).</p><p>∙  Выявление и устранение дефектов и неисправностей оборудования, ликвидация аварий.</p><p>∙  Осуществление оперативных переключений в распределительных устройствах.</p><p>∙  Допуск ремонтного персонала к работам и приемка работ после ремонта.</p><p>3.  Охрана труда, безопасность и экология:</p><p>∙  Обеспечение безопасных условий труда, организация инструктажей.</p><p>∙  Участие в расследовании несчастных случаев, разработка мероприятий по их предотвращению.</p><p>∙  Контроль за выполнением требований электробезопасности, пожарной безопасности.</p><p>∙  Принятие мер по недопущению загрязнения окружающей среды.</p><p>4.  Планирование и отчетность:</p><p>∙  Ведение оперативной, технической документации и отчетности.</p><p>∙  Участие в разработке графиков ППР, планов капитальных ремонтов.</p><p>∙  Учет потребляемой электроэнергии.</p><p>∙  Участие в приемке в эксплуатацию нового оборудования.</p>", "requirements": "<p>Образование:</p><p>Дополнительная квалификация:</p><p>Опыт работы:</p>", "entity": "ООО \"ВГК Сервис\"", "category": "Руководитель", "city": "Шахтерск", "schedule": "Полный день", "experience": "Без опыта", "demand": 1, "links": [{"url": "https://hh.ru/vacancy/130155976", "type": "Headhunter"}], "key_skills": [], "recruiter": "Данцева Александра Юрьевна", "recruiter_email": "dantsevaay@eastmining.ru", "department": "Блок заместителя исполнительного директора по техническому развитию", "director": "Колодяжный Григорий Юрьевич"}, {"id": 1528277, "name": "Управляющий кафе Гора и море", "description": "", "responsibilities": "<p id=\"isPasted\">Опыт руководства в HoReCa — от 5 лет (желательно с опытом в караоке‑бизнесе). Инновации и не стандартный подход к бизнесу. Контроль выручки, себестоимости, ФОТ, бюджета, KPI. Контроль качества обслуживания, работы кухни/бара, соблюдения регламентов. Ритмичная работа и нацеленность на результат. Внедрение стандартов, оптимизация расходов, автоматизация. Акции, мероприятия, ведение соцсетей, работа с клиентской базой.&nbsp;</p><p>Учёт выручки и расходов: ежедневный мониторинг доходов, анализ маржинальности блюд/напитков. Бюджетирование: планирование месячных/квартальных затрат, контроль исполнения бюджета. Анализ KPI: отслеживание ключевых показателей (средний чек, загрузка зала, себестоимость продукции), план выхода к поставленной цели. Работа с отчётностью: формирование отчётов по выручке, ФОТ, заявки/закупки, прибыли/убыткам. Контроль себестоимости: расчёт и оптимизация затрат на продукты, напитки, расходные материалы. Антикризисные рычаги (анализ закупок, заявок). Энергоэффективность. Адаптация меню услуг с акцентом на караоке.</p><p>Подбор, адаптация, обучения, мотивация персонала. Распределение обязанностей, оценка эффективности сотрудников. KPI.</p><p>Знание нормативной и правовой базы. Контроль качества входной продукции и на выходе сервиса. Формирование меню, барной карты на основании тренда на рынке.</p><p>Стратегическое планирование, анализ рынка и конкурентов, продуктовая и барная матрица. Маркетинговые инициативы. Оптимизация процессов. Знание инструментов отчетности 1С, iiko, POS. Взаимодействие с подразделениями компании. Коммуникабельность, аналитическое мышление, инициативность, самостоятельность, стрессоустойчивость.</p><p><br>\n</p>", "requirements": "<p>Образование:</p><p>Дополнительная квалификация:</p><p>Опыт работы:</p>", "entity": "ООО \"ВГК Сервис\"", "category": "Руководитель", "city": "Шахтерск", "schedule": "Полный день", "experience": "Без опыта", "demand": 1, "links": [{"url": "https://hh.ru/vacancy/130650443", "type": "Headhunter"}], "key_skills": [], "recruiter": "Сидоренко Татьяна Владимировна", "recruiter_email": "sidorenkotv@eastmining.ru", "department": "Блок заместителя исполнительного директора по проектам общественного питания и торговли", "director": "Лысенко Илья Русланович"}, {"id": 1528809, "name": "Начальник отдела бухгалтерского и  налогового  учета", "description": "", "responsibilities": "<p>40 юр лиц</p><p>3 на упрощенке, проверяет полную отчетность.</p><p>Организует и проверяет отчетность по форме 1 и 2</p>", "requirements": "<p>Образование:высшее, аттестат &nbsp;аудитора, ДипИФР &nbsp;приветствуется.&nbsp;</p><p>Дополнительная квалификация: хорошее знание всех &nbsp;ПБУ и ФСБУ, Положений Налогового Кодекса. &nbsp;</p><p>Опыт работы:главбухом или на &nbsp;аналогичной должности, &nbsp;наличие сотрудников в подчинении, хорошее знание ПБУ и ФСБУ, Налогового Кодекса РФ.</p>", "entity": "ООО \"Технология финансов\"", "category": "Руководитель", "city": "Новосибирск", "schedule": "Полный день", "experience": "3-6 лет", "demand": 1, "links": [], "key_skills": ["Бухгалтерская отчетность", "Налоговая отчетность"], "recruiter": "Жидина Наталья Васильевна", "recruiter_email": "zhidinanv@eastmining.ru", "department": "Нет управления/службы", "director": "Васина Марина Юрьевна"}, {"id": 1531355, "name": "Механик по ремонту", "description": "", "responsibilities": "<p id=\"isPasted\"> Организация, контроль и непосредственно личное участие в эффективном и&nbsp;<strong>безопасном</strong>&nbsp; &nbsp;ремонте горного основного (экскаваторы) и вспомогательного (бульдозера, ДСК и прочие объекты разреза) оборудования. Определение персонала для работы, необходимой техники и инструмента. &nbsp; Выполнение заявок на ТМЦ, технику. Проверка технического состояния и &nbsp;правильной эксплуатации оборудования. Своевременное заполнение необходимой документации (нарядов, &nbsp;актов, отчетов и др.) как на бумажных носителях, так и в эл.виде .</p>", "requirements": "<p>Образование: высшее профессиональное (техническое) стаж 3года или среднее профессиональное (техническое) стаж 5 лет</p><p>Дополнительная квалификация:</p><p>Опыт работы: Опыт проведения ремонта оборудования и механизмов, умение читать чертежи и пользоваться электронными каталогами по технике. Опыт получения аттестации по промышленной безопасности. Опыт организации проведения ремонта и знания технологий проведения ремонтов оборудования &nbsp; и умение пользоваться справочной информацией. Знать &nbsp;и уметь пользоваться измерительным инструментом и вспомогательным инструментом для ремонтов.</p>", "entity": "ООО \"СУР\"", "category": "ИТР", "city": "Шахтерск", "schedule": "Сменный", "experience": "3-6 лет", "demand": 1, "links": [], "key_skills": ["Ремонт оборудования"], "recruiter": "Явтушенко Ирина Андреевна", "recruiter_email": "yavtushenkoia@eastmining.ru", "department": "Служба заместителя директора по ремонтам", "director": "Буков Сергей Николаевич"}, {"id": 1533082, "name": "Кладовщик ГСМ+ТМЦ", "description": "", "responsibilities": "<p>Образование:</p><p>Дополнительная квалификация:</p><p>Опыт работы:</p>", "requirements": "", "entity": "ООО \"СУР\"", "category": "Специалист", "city": "Шахтерск", "schedule": "Вахта", "experience": "1-3 года", "demand": 16, "links": [{"url": "https://hh.ru/vacancy/131331214", "type": "Headhunter"}, {"url": "https://emco.potok.io/open/jobs/1533082", "type": "Career"}], "key_skills": [], "recruiter": "Заиграева Диана Евгеньевна", "recruiter_email": "zaigraevade@eastmining.ru", "department": "Служба заместителя директора по снабжению", "director": "Цветков Алексей Игоревич"}, {"id": 1533406, "name": "Технический директор по флоту", "description": "", "responsibilities": "<p id=\"isPasted\">Мониторинг технического состояния судов, механизмов, электрооборудования и средств навигации.</p><p>Обеспечение технической готовности флота к работе и минимизация простоев.</p><p>Организация классификационных освидетельствований, инспекторских осмотров.</p><p>Планирование, организация и контроль текущих, плановых и доковых ремонтов.</p><p>Управление проектами переоборудования и модернизации судов.</p><p>Организация поставок запчастей, материалов и технического снабжения.</p><p>Подготовка технической документации.</p><p>Контроль соблюдения международных конвенций, государственных законов и правил безопасности.</p><p>Руководство службой эксплуатации флота.</p><p>Учет и анализ эксплуатационного бюджета, поиск вариантов снижения затрат.</p><p>Взаимодействие с судоремонтными предприятиями и подрядчиками.</p>", "requirements": "<p>морское техническое образование в объеме программ признанных и полномочных на то учебных заведений и опыт работы в должности старшего механика морского судна, или на руководящей должности (по профильной специальности) работы в судоходных компаниях;<br>\n</p>", "entity": "ООО \"УМПШ\"", "category": "Руководитель", "city": "Шахтерск", "schedule": "Полный день", "experience": "3-6 лет", "demand": 1, "links": [{"url": "https://hh.ru/vacancy/131058825", "type": "Headhunter"}, {"url": "https://hh.ru/vacancy/131058826", "type": "Headhunter"}], "key_skills": [], "recruiter": "Кондратова Василина Вадимовна", "recruiter_email": "kondratovavv@eastmining.ru", "department": "Портофлот", "director": "Герасименко Петр Владимирович"}, {"id": 1533407, "name": "Техник КИПиА", "description": "", "responsibilities": "<p id=\"isPasted\">- Выполнение работ по программированию и настройке (наладке) преобразовательной техники (преобразователи частоты);</p><p>- Выполнение работ по обслуживанию систем автоматизации, на базе программируемых-логических контроллеров;</p><p>- Контроль за работой оборудования КИПиА и программного обеспечения, средств автоматизации конвейерного оборудования, разгрузочно-погрузочных и судопогрузочных машин;</p><p>- Находить причины выхода из строя оборудования КИПиА и сбоев программного обеспечения. Производить ремонт вышедшего из строя оборудования КИПиА;</p><p>- Следить за работоспособностью автоматизированного оборудования в системах автоматики, программного обеспечения, производить его установку и настройку, осуществляет резервное копирование</p>", "requirements": "<p id=\"isPasted\">Образование: Высшее, средне-специальное (Автоматизация, КИПиА,)</p><p>Дополнительная квалификация:</p><p>Опыт работы: от 5 лет</p>", "entity": "ООО \"ВГК Транспортные системы\"", "category": "Рабочий", "city": "Шахтерск", "schedule": "Вахта", "experience": "3-6 лет", "demand": 1, "links": [{"url": "https://hh.ru/vacancy/130327147", "type": "Headhunter"}], "key_skills": [], "recruiter": "Черниева Анастасия Сергеевна", "recruiter_email": "chernievaas@eastmining.ru", "department": "Служба технического директора", "director": "Попов Алексей Николаевич"}, {"id": 1533497, "name": "Старший помощник капитана т/х \"Валерий Онищук\" /посадка 23.03.2026", "description": "", "responsibilities": "<ol class=\"decimal_type\" id=\"isPasted\"><li>Обеспечение безопасности плавания судна, безопасной перевозки грузов.</li><li>Выполнение на судне грузоперевозок и/или швартовых операций.</li><li>Организация соблюдения требований по охране окружающей среды.</li><li>Обеспечение функционирования системы управления охраной труда на судне.&nbsp;</li><li>Соблюдение требований транспортной безопасности.&nbsp;</li><li>Организация документооборота на судне.</li></ol>", "requirements": "<p>Образование: Судоводитель</p><p>Рабочий диплом свыше 500 регистровых тонн (валовая вместимость Онищука 1700тонн), т.е. если будет ограничение до 3000тонн, тоже подходит.&nbsp;</p><p><br>\n</p>", "entity": "ООО \"УМПШ\"", "category": "Специалист", "city": "Шахтерск", "schedule": "Полный день", "experience": "3-6 лет", "demand": 1, "links": [{"url": "https://hh.ru/vacancy/131366323", "type": "Headhunter"}, {"url": "https://hh.ru/vacancy/131366324", "type": "Headhunter"}], "key_skills": [], "recruiter": "Сидоренко Татьяна Владимировна", "recruiter_email": "sidorenkotv@eastmining.ru", "department": "Портофлот", "director": "Лопарев Сергей Владимирович"}, {"id": 1534572, "name": "PA", "description": "", "responsibilities": "<p>Обязанности</p><ol><li>Полное ведение календаря и задач руководителя: приоритеты, защита времени, контроль исполнения без напоминаний</li><li>Самостоятельное доведение любых задач до результата: от идеи до закрытия</li><li>Организация бизнес- и личных поездок под ключ по всему миру (визовые вопросы, логистика, сопровождение)</li><li>Координация взаимодействия с топ-менеджментом, подрядчиками, сервисами и частными специалистами</li><li>Управление личными активами руководителя: автомобили, яхта, недвижимость (РФ / Дубай / Европа)</li><li>Подбор и координация редкого персонала (водители, экипаж яхты, домашний персонал)</li><li>Контроль оплат, отчётность, cash-flow, документы, переводы, печать</li><li>Закупки, бюджеты, доставка, контроль качества и сроков</li><li>Организация личных и корпоративных мероприятий</li><li>Поддержка семьи руководителя по организационным вопросам</li><li>Поиск информации, аналитика, таблицы, подготовка материалов для решений</li><li>Работа в режиме высокой неопределённости и нестандартных ситуаций</li></ol>", "requirements": "<h2>Требования</h2><ol><li>Абсолютная ответственность: задача считается закрытой только после результата</li><li>Умение работать в высоком темпе и с высокой плотностью задач без истерик и потерь</li><li>Самостоятельность мышления: видеть риски, предлагать решения, а не задавать тупые вопросы</li><li>Опыт работы с сильными, требовательными руководителями или внутренняя готовность к такому формату</li><li>Умение управлять календарём и приоритетами как инструментом, а не формальностью</li><li>Холодная голова в хаосе и стрессовых ситуациях</li><li>Конфиденциальность, такт, взрослая коммуникация</li><li>Готовность к нестандартным задачам, гибкому графику и широкой географии</li><li>Быстрое обучение, интерес к новым инструментам (в т.ч. ИИ)</li><li>Отсутствие ожидания микроменеджмента, инструкций и постоянной обратной связи</li></ol>", "entity": "ООО \"ВГК\"", "category": "Специалист", "city": "Москва", "schedule": "Полный день", "experience": "Без опыта", "demand": 1, "links": [], "key_skills": [], "recruiter": "Меркуль Екатерина Сергеевна", "recruiter_email": "merkules@eastmining.ru", "department": "Нет управления/службы", "director": "Демешкина Анна Сергеевна"}, {"id": 1535226, "name": "Капитан Новое судно 1/ посадка 05.06.2026", "description": "", "responsibilities": "<p id=\"isPasted\">Обеспечение безопасности людей на борту, судна в целом, груза и предотвращение загрязнения окружающей среды.</p><p>Выполнение требований СУБ на борту судна.</p><p>Сообщение в Компанию обо всех несоответствиях и авариях на судне.</p><p>Побуждение членов экипажа к выполнению Политики Компании и процедур СУБ.</p><p>Обеспечение погрузки и выгрузки, своевременного отплытия судна.</p><p>Обеспечение мореходных качеств судна.</p><p>Соответствие судна национальным, конвенционным и классификационным требованиям.</p><p>Отслеживание сроков действия и возобновление судовых документов.</p><p>Формирование экипажа судна в соответствии со Свидетельством о минимальном составе экипажа.</p><p>Решение всех вопросов, связанных с экипажем, включая обучение, тренировки и оценку (совместно с береговым офисом);</p><p>Контроль за исполнением членами экипажа своих обязанностей.</p><p>Анализ судовой документации по СУБ, Судового плана чрезвычайных мер по борьбе с разливом нефти, планов судовых операций и подготовка предложений по их совершенствованию.</p><p>Взаимодействие с агентами, портовыми властями и грузоотправителями.</p><p>Составление бюджета судна и контроль расходов судна.</p><p>Безопасная навигация и выполнение обязанностей на мостике по необходимости.</p><p>Управление в любой аварийной ситуации.</p>", "requirements": "<p>Наличие среднего, или высшее профессионального образования в области судовождения, действующий рабочий диплом &nbsp;капитана с ограничениями по тоннажу судна, или без, а также имеющее диплом оператора ГМССБ соответствующего района плавания, свидетельства о прохождении специальных подготовок, УЛМ, мореходная книжка, медицинская комиссия.<br>\n</p>", "entity": "ООО \"УМПШ\"", "category": "ИТР", "city": "Шахтерск", "schedule": "Сменный", "experience": "3-6 лет", "demand": 1, "links": [], "key_skills": [], "recruiter": "Сидоренко Татьяна Владимировна", "recruiter_email": "sidorenkotv@eastmining.ru", "department": "Портофлот", "director": "Лопарев Сергей Владимирович"}, {"id": 1535228, "name": "Старший помощник капитана Новое судно 1 /посадка 05.06.2026", "description": "", "responsibilities": "<p>1. Организация приема, размещения, крепления и выгрузки груза, оформление грузовых документов, контроль за сохранностью пломб.</p><p>2.Обеспечение живучести, водонепроницаемости корпуса, контроль состояния спасательных средств и противопожарного оборудования.</p><p>3. &nbsp;Распределение обязанностей, составление расписаний по тревогам, организация работы палубной команды (боцмана и матросов).</p><p>4. Поддержание палубы, надстроек и оборудования в технически исправном состоянии, контроль расхода балластной и пресной воды.</p><p>5.Ведение судовых журналов, подготовка отчетов, учет рабочего времени и бытовое обеспечение экипажа.&nbsp;</p>", "requirements": "<p>Наличие среднего, или высшее профессионального образования в области судовождения, действующий рабочий диплом старшего помощника капитана с ограничениями по тоннажу судна, или без, а также имеющее диплом оператора ГМССБ соответствующего района плавания, свидетельства о прохождении специальных подготовок, УЛМ, мореходная книжка, медицинская комиссия.<br>\n</p><p><br>\n</p>", "entity": "ООО \"УМПШ\"", "category": "Специалист", "city": "Шахтерск", "schedule": "Полный день", "experience": "3-6 лет", "demand": 1, "links": [], "key_skills": [], "recruiter": "Сидоренко Татьяна Владимировна", "recruiter_email": "sidorenkotv@eastmining.ru", "department": "Портофлот", "director": "Лопарев Сергей Владимирович"}, {"id": 1535229, "name": "Вахтенный помощник капитана Новое судно 1/ посадка 05.06.2026", "description": "", "responsibilities": "<p id=\"isPasted\">1. Обеспечение безопасности плавания судна, безопасной перевозки грузов.</p><p>2. Выполнение на судне грузоперевозок и/или швартовых операций.</p><p>3. Участие в обеспечении функционирования системы управления охраной труда на судне.</p><p>5. Соблюдение требований транспортной безопасности.&nbsp;</p><p>6. Организация продовольственного снабжения на судне.</p><p>7. Контроль за техническим состоянием</p><p><br>\n</p>", "requirements": "<p>Наличие среднего, или высшее профессионального образования в области судовождения, действующий рабочий диплом вахтенного помощника капитана с ограничениями по тоннажу судна, или без, а также имеющее диплом оператора ГМССБ соответствующего района плавания, свидетельства о прохождении специальных подготовок, УЛМ, мореходная книжка, медицинская комиссия.<br>\n</p>", "entity": "ООО \"УМПШ\"", "category": "Специалист", "city": "Шахтерск", "schedule": "Полный день", "experience": "3-6 лет", "demand": 1, "links": [], "key_skills": ["Картография"], "recruiter": "Сидоренко Татьяна Владимировна", "recruiter_email": "sidorenkotv@eastmining.ru", "department": "Портофлот", "director": "Лопарев Сергей Владимирович"}, {"id": 1535260, "name": "Суперинтендант", "description": "", "responsibilities": "<p id=\"isPasted\">Анализ работы механизмов, систем и технической документации.</p><p>Контроль графиков ТО и ремонтных работ.</p><p>Составление ведомостей, выбор подрядчиков, контроль качества и сроков заводских ремонтов.</p><p>Обеспечение судов запчастями, расходными материалами и ГСМ, проверка заявок.&nbsp;</p><p>Взаимодействие с классификационным обществом РМРС, подготовка судов к инспекциям.</p><p>Подготовка документации, сертификация, обеспечение соответствия требованиям флага.</p><p>Проверка соблюдения правил техники безопасности, инструкций и рабочих процессов.&nbsp;</p><p>Формирование бюджета по судам, контроль расходов.</p><p>Ведение отчетов, учет материалов, работа с договорами.</p>", "requirements": "<p>Образование:</p><p>&nbsp; &nbsp; наличие высшего профессионального образования в области эксплуатации судовых двигательных установок&nbsp;</p><p>Дополнительная квалификация:&nbsp;<br>\n<strong id=\"isPasted\">Опыт</strong>: морское техническое образование в объеме программ признанных и полномочных на то учебных заведений и опыт работы в должности механика морского судна, или на руководящей должности (по профильной специальности) работы в судоходных компаниях;</p><p> </p>", "entity": "ООО \"УМПШ\"", "category": "Специалист", "city": "Шахтерск", "schedule": "Полный день", "experience": "3-6 лет", "demand": 1, "links": [{"url": "https://hh.ru/vacancy/130297113", "type": "Headhunter"}, {"url": "https://hh.ru/vacancy/130297114", "type": "Headhunter"}], "key_skills": ["Техническая эксплуатация судна"], "recruiter": "Сидоренко Татьяна Владимировна", "recruiter_email": "sidorenkotv@eastmining.ru", "department": "Портофлот", "director": "Лопарев Сергей Владимирович"}, {"id": 1535638, "name": "Батяня", "description": "", "responsibilities": "<p><strong>Лидер организации сообщества ветеранов / \"Батяня\"</strong></p><p><strong>Локация:</strong> Южно-Сахалинск или Шахтерск</p><p><strong>Прямое подчинение:</strong> ТОП-менеджмент компании (Босой или Бородин).</p><h3>О ПРОЕКТЕ</h3><p>ВГК — это 5000 сотрудников и ответственность за весь Углегорский район. Мы понимаем: возвращение бойцов к мирной жизни не решается выплатами. Оно решается через <strong>смысл, команду и новую профессию</strong>. Мы запускаем комплексную программу ресоциализации, основанную на лучших мировых практиках по работе с ветеранами военных действий. Нам нужен человек, который возглавит этот процесс на месте и станет для ветеранов настоящим «отцом-командиром».</p><p><br>\nТВОЯ МИССИЯ</p><p>Выстроить «Маршрут возвращения» для бойцов: от первой встречи до закрепления в новой профессии на предприятиях ВГК. Ты должен стать мостом между боевым прошлым человека и его стабильным трудовым будущим.</p><h3>ЧТО НУЖНО БУДЕТ ДЕЛАТЬ (ЗАДАЧИ)</h3><ul><li><strong>Стать лицом программы:</strong> Проводить установочные встречи, объяснять правила «Контракта взаимных обязательств» (мы даем обучение и работу — боец дает дисциплину и готовность расти).</li><li><strong>Сформировать сообщество:</strong> Организовать «Ветеран-центр» как точку сборки. Создать атмосферу «свои среди своих», где есть структура и взаимовыручка.</li><li><strong>Управлять треками адаптации:</strong> Совместно с HR и производством курировать переобучение ветеранов на востребованные в ВГК профессии (водители большегрузов, механики, операторы).</li><li><strong>Реализовывать «Проекты со смыслом»:</strong> Организовать участие ветеранов в жизни района (помощь семьям погибших, благоустройство, наставничество) — работа через действие, а не через пособия.</li><li><strong>Держать дисциплину:</strong> Быть фильтром на входе. Отсеивать тех, кто не готов, и поддерживать тех, кто хочет выбраться.</li></ul><h3>КТО ТЫ</h3><ul><li><strong>Мужчина с реальным боевым опытом.</strong> Ты говоришь с ветеранами на одном языке, знаешь, что такое ПТСР и дезадаптация не по учебникам.</li><li><strong>Офицер (полковник / подполковник в запасе).</strong> Тебе не нужно объяснять, что такое субординация, ответственность за личный состав и управление ресурсами.</li><li><strong>Управленец.</strong> Ты умеешь планировать, отчитываться за результат и взаимодействовать с гражданскими структурами (GR).</li><li><strong>Твоя мотивация</strong> — не просто «занять должность», а реально помочь ветерану найти себя в мирной жизни под крылом сильного работодателя.</li></ul><h3>ЧТО МЫ ПРЕДЛАГАЕМ</h3><ul><li><strong>Ресурс крупнейшего холдинга:</strong> У тебя будет бюджет, пространство для центра, поддержка службы безопасности и учебного комбината ВГК.</li><li><strong>Работа на результат:</strong> Мы не требуем пафосных отчетов. Нам нужны люди, которые вышли на смены и закрепились в семьях.</li><li><strong>Масштаб:</strong> Пилот в Углегорске должен стать федеральным стандартом. Ты будешь тем, кто его создал.</li><li><strong>Условия:</strong> </li></ul><hr><h3>ПОЧЕМУ ЭТО ВАЖНО</h3><p>Мы инвестируем в возвращение Людей к нормальной жизни. Если ты готов взять ответственность за «Вторую смену» наших героев — мы ждем тебя.</p><p><br>\n</p><p><br>\n</p><p>С 0 создать Сообщество Ветеранов.</p><p>Развитие карьерных треков, создание условий для социализации ребят прошедших СВО.</p><p>Психологическая реабилитация, мотивация на развитие ребят.</p><p>Поддержка ребят прошедших СВО.</p><p><br>\n</p><p>Смотрят кандидатов : Босой и Бородин.</p><p><br>\n</p><h3>1. Мотивация и личная вовлечённость</h3><ul><li>Почему вы хотите возглавить Совет ветеранов? Что для вас значит эта работа?</li><li>Имеете ли вы личный опыт (военная служба, работа с ветеранами, семья ветеранов)? Как это повлияло на ваше отношение к теме?</li></ul><h3>2. Лидерские и организационные навыки</h3><ul><li>Какой у вас опыт руководства коллективами?</li><li>Как вы будете выстраивать работу с неоднородной группой (ветераны разных родов войск, возрастов, состояния здоровья)?</li><li>Приведите пример, когда вам удалось сплотить группу вокруг общей цели.</li><li>Как будете распределять обязанности между членами Совета? Как мотивировать волонтёров?</li></ul><div><br>\n</div><h3>3. Работа с проблемами ветеранов</h3><ul><li>Какие, на ваш взгляд, главные проблемы ветеранов в нашем регионе/организации?</li><li>Как будете отстаивать интересы ветеранов перед администрацией, органами власти, работодателями?</li><li>Как подойдёте к решению конфликтной ситуации между ветеранами или между ветераном и администрацией?</li></ul><div><br>\n</div><h3>4. Организация деятельности Совета</h3><ul><li>Какие мероприятия считаете приоритетными (памятные даты, соцподдержка, досуг, медпомощь)?</li><li>Как будете вести документацию, планирование, отчётность Совета?</li></ul><ul><li>Какие каналы коммуникации предложите для связи с членами Совета (особенно маломобильными)?</li></ul><div><br>\n</div><h3>5. Работа с внешними структурами</h3><ul><li>Какой у вас опыт взаимодействия с администрацией, соцзащитой, волонтёрскими организациями?</li><li>Как будете привлекать ресурсы ( гранты, волонтёры)?</li><li>Как организуете подготовку документов для получения льгот/поддержки для конкретных ветеранов?</li></ul><h3>7. Видение развития</h3><ul><li>Каким вы видите Совет ветеранов через год при вашем руководстве?</li><li>Какие новые форматы работы с ветеранами хотели бы внедрить?</li><li>Как будете сохранять преемственность и передавать опыт новым поколениям?</li></ul><div><br>\n</div><div><hr></div><div><br>\n</div><div><strong>Рекомендация:</strong> Обратите внимание на:</div><ul><li>Эмпатию и уважение к разным поколениям</li><li>Практическую смекалку (часто ресурсов мало — нужны креативные решения)</li><li>Стрессоустойчивость (работа с людьми с травмами, потерями требует выдержки)</li><li>Готовность к «мелочам» — оформление справок, сопровождение в поликлинику и т.д.</li></ul><p><br>\n</p><p><br>\n</p>", "requirements": "<p>Супер идейный, Лидер.</p><p>Софты: лидерство, умение вести за собой.</p><p>если с ЮС то должен быть готов к переезду или длительной командировке на полгода в Шахтерск.</p><p>Ищем кандидатов с Дальнего Востока и Сахалинской области.</p><p><br>\n</p><p>Таргет:</p><p>1. военный комиссариат Сахалинской области, г. Южно-Сахалинск, тел 8-424-2-75-41-04 Аас Майя Михайловна- передала контакт, перезвонят мне, перезвонят с музея военкомата, обещали подобрать человека.</p><p>2. Военный комиссариат, г Углегорск, тел 8-914-097-71-17 Лихтар Наталья, 8-424-324-41-32 - военком Алексей Васильевич - взяли время до 13.02, перезвонить ed\">1. Обеспечение безопасности плавания судна, безопасной перевозки грузов.</p><p>2. Выполнение на судне грузоперевозок и/или швартовых операций.</p><p>3. Участие в обеспечении функционирования системы управления охраной труда на судне.</p><p>5. Соблюдение требований транспортной безопасности.&nbsp;</p><p>6. Организация продовольственного снабжения на судне.</p><p>7. Контроль за техническим состоянием</p><p><br>\n</p>", "requirements": "<p>Наличие среднего, или высшее профессионального образования в области судовождения, действующий рабочий диплом вахтенного помощника капитана с ограничениями по тоннажу судна, или без, а также имеющее диплом оператора ГМССБ соответствующего района плавания, свидетельства о прохождении специальных подготовок, УЛМ, мореходная книжка, медицинская комиссия.<br>\n</p>", "entity": "ООО \"УМПШ\"", "category": "Специалист", "city": "Шахтерск", "schedule": "Полный день", "experience": "3-6 лет", "demand": 1, "links": [], "key_skills": ["Картография"], "recruiter": "", "recruiter_email": "", "department": "Портофлот", "director": "Лопарев Сергей Владимирович"}, {"id": 1539514, "name": "Повар-заготовщик", "description": "", "responsibilities": "<ul data-processed=\"true\"><li data-hveid=\"CAMQAQ\" data-processed=\"true\">Мойка, чистка, нарезка овощей, фруктов, мяса, рыбы.</li><li data-hveid=\"CAMQAg\" data-processed=\"true\">Обвалка и разделка мяса, рыбы.</li><li data-hveid=\"CAMQBQ\" data-processed=\"true\">Заготовка различных видов теста (дрожжевое, слоеное, песочное).</li><li data-hveid=\"CAMQBg\" data-processed=\"true\">Приготовление фаршей для изделий.</li><li data-hveid=\"CAMQBw\" data-processed=\"true\">Формовка полуфабрикатов (пирожков, пельменей, чебуреков).</li><li data-hveid=\"CAMQBw\" data-processed=\"true\">Соблюдение рецептур и технологических карт.</li><li data-hveid=\"CAMQBw\" data-processed=\"true\">Контроль качества сырья и полуфабрикатов.</li><li data-hveid=\"CAMQBw\" data-processed=\"true\">Соблюдение сроков и условий хра <li>Настройка системы датчиков (температура, задымление, вибрация, трение)</li><li>Внедрение предиктивных алгоритмов (раннее выявление очагов)</li><li>Формирование цифровых дашбордов риска</li><li>Обязательная фото- и видеофиксация</li><li>Автоматизация эскалации</li></ul><p><strong>4️</strong><strong>⃣</strong><strong> Учения и готовность</strong></p><ul><li>Проведение регулярных учений</li><li>Проверка времени реагирования</li><li>Аудит работоспособности систем тушения</li><li>Разбор инцидентов на уровне руководства</li></ul><p><strong>5️</strong><strong>⃣</strong><strong> Инвестиционные инициативы</strong></p><ul><li>Формирование предложений по модернизации</li><li>Обоснование CAPEX в зоне пожарной безопасности</li><li>Контроль реализации технических решений</li></ul><p><strong>6️</strong><strong>⃣</strong><strong> Институциональный контроль</strong></p><ul><li>Внесение обязательных предписаний службам</li><li>Контроль исполнения</li><li>Взаимодействие с надзорными органами</li><li>Формирование внутреннего регламента “нулевой терпимости”</li></ul><p><strong>KPI</strong></p><ul><li>0 возгораний и задымлений</li><li>Снижение повторяемости очагов в одних и тех же точках</li><li>Время реакции на инцидент</li><li>Доля устранения первопричин</li><li>Снижение объема просыпей</li><li>Доля автоматизированного контроля рисков</li><li>Процент реализованных технических инициатив</li></ul><p><br>\n</p><p><br>\n</p><p><br>\n</p>", "requirements": "<ul><li><strong>Требования</strong><ul><li>5+ лет в тяжелой промышленности (конвейерные системы, угольная перегрузка, терминалы)</li><li>Опыт системного управления рисками</li><li>Опыт руководства межфункциональной командой</li><li>Понимание инженерных решений узлов пересыпа</li><li>Понимание цифровых систем мониторинга</li><li>Желателен опыт в пожарном надзоре или расследовании пожаров</li><li>Сильные лидерские качества и способность требовать исполнения</li></ul></li><li><p><strong>Личностный профиль</strong></p><ul><li>Авторитет</li><li>Жесткость в исполнении</li><li>Системность</li><li>Настойчивость</li><li>Инженерное мышление</li><li>Нетерпимость к халатности</li></ul></li></ul>", "entity": "ООО \"ВГК Транспортные системы\"", "category": "ИТР", "city": "Шахтерск", "schedule": "Полный день", "experience": "Без опыта", "demand": 1, "links": [{"url": "https://uglegorsk.superjob.ru/vakansii/rukovoditel-napravleniya-po-upravleniyu-pozharnymi-riskami-transportnoj-sistemy-i-ugolnyh-skladov-51732920.html", "type": "Superjob"}], "key_skills": [], "recruiter": "Плотникова Ксения Александровна", "recruiter_email": "plotnikovaka@eastmining.ru", "department": "Служба технического директора", "director": "Риттина Екатерина"}, {"id": 1539903, "name": "Директор по производству", "description": "", "responsibilities": "<p><strong>Контекст</strong><br>\nТекущий главный диспетчер (Каюнов М.) перегружен: совмещает диспетчеризацию, управление производством, автотранспортом, флотом — не справляется с тактикой, стратегией, внедрением систем. Нет \"хозяина поляны\", системного подхода к контролю производительности. Открыта вакансия для разгрузки диспетчера, сохранения его в компании и выстраивания вертикали власти.</p><p><strong>Цель роли</strong></p><ul><li>Внедрить системный подход к управлению всем производством: от приема угля (дробилки, ЦПТ/СПК) до отгрузки на суда (СПМ, грейферы). </li><li>Стабилизировать производительность на 4000 т/ч без пиков/провалов, выстроить процессы, изменения для оперативного реагирования на инциденты/аварии. </li><li>Увеличить перевалку на 26% относительно 2025г. </li></ul><p><strong>Функционал / зона ответственности</strong></p><p><strong>1.Обеспечение бесперебойной работы порта и координация транспортной логистики</strong></p><ul><li>Руководство производственной деятельностью Компании, организация перевалки различных типов грузов (генеральных, навалочных, контейнеров, включая опасные грузы).</li><li>Контроль от разгрузки (дробилки, строящийся ЦПТ/СПК) до отгрузки (СПМ, стивидор, РОK 3, грейферы ГТ).</li><li>Стабилизация на 4000 т/ч по конвейерам, СПК, СПМ; переход на ГТ при остановках.</li></ul><p><strong>2. Управление крупным производственным подразделением и техническими ресурсами</strong></p><ul><li>Эксплуатация перегрузочной техники.  </li></ul><p><strong>3. Реализация проектов по автоматизации и повышению эффективности</strong></p><ul><li>Внедрение контроля производительности, регламентов ТО, эксплуатации конвейеров/оборудования.</li><li>Разработка и внедрение производственной системы с применением инструментов бережливого производства.</li></ul><p><strong>4. Оптимизация операционных процессов и снижение расходов</strong></p><ul><li>Увеличение интенсивности обработки грузов.</li><li>Планирование ремонтов, управление командой/подрядчиками, минимизация простоев.</li><li>Сокращение расходов при погрузке</li></ul><p><strong>5. Развитие команды </strong></p><ul><li>Формирование и развитие команды.</li></ul><p><strong> </strong></p><p><strong>Подразделения в подчинении</strong></p><ul><li>Главный инженер УМПШ – (здания, сооружения, инженерные сети, дороги, ГТО и тд)</li><li>Начальник ПК (погрузочный комплекс), угольный терминал.</li><li>Производственно-технический отдел (планирование, бюджетирование , потребность в технике, разработка технологии).</li><li>Механик участка ГТ, механики. </li></ul><p><strong>Требования (обязательные)</strong></p><ul><li>Высшее инженерное/техническое образование; опыт прохождения от низов до верхов в портах/терминалах (желательно угольные/морские/речные порты, сухие терминалы).</li><li>Руководство производством в порту/промышленности.</li><li>Понимание специфики: конвейеры, СПН, грейферы, стивидор, флот, регламенты ТО/эксплуатации.</li><li>Системный подход: выстраивание процессов.</li><li>Лидерство: управление людьми/командой, фокус на результатах в сложных условиях.</li></ul><p><strong>Личностный профиль (в соответствии с Правилами успеха ВГК)</strong></p><ul><li>Лидерство: \"хозяин поляны\", мотивирует команд узочные работы на угольном складе СУР</p>", "requirements": "<p>7/04/2025 + 6 FTE вахта мая (Фурс)</p><p>Сложность: 1</p><p>Увелечение FTE до 11 человек, На ноябрь (поэкипажная растановка) - фурс\\брейкин\\бурденко</p><p><br>\n</p><p><br>\n</p><p>12 людей на январь 2025 - фурс от 1/12/2024</p><p><br>\n</p><p>БП - Николаева Виктория</p><p><br>\n</p><p><br>\n</p><p><br>\n</p><p>Образование:</p><p>Дополнительная квалификация:</p><p>Опыт работы:</p>", "entity": "ООО \"СУР\"", "category": "Рабочий", "city": "Шахтерск", "schedule": "Вахта", "experience": "3-6 лет", "demand": 3, "links": [], "key_skills": [], "recruiter": "Фурс Дарья Евгеньевна", "recruiter_email": "fursde@eastmining.ru", "department": "Управление тракторно-бульдозерной техники", "director": "Милютин Андрей Леонидович"}, {"id": 1540174, "name": "Машинист бульдозера 6-8 разряд", "description": "", "responsibilities": "<p>виды выполняемых работ машинистами бульдозеров.</p><p><strong>Машинисты бульдозеров на угольных разрезах выполняют различные виды работ</strong>, связанные с перемещением горной массы, планировкой площадей, рыхлением пород и другими задачами. Некоторые из них: </p><p>·<strong>Вскрышные работы</strong> — снятие верхних слоёв породы для доступа к полезным ископаемым.</p><p>·<strong>Выравнивание дорог</strong> для движения карьерных самосвалов, поддержание уклонов не более 8–10 градусов.</p><p>·<strong>Формирование защитных валов</strong> высотой 1,5–2 метра вдоль дорог для предотвращения съезда транспорта в карьер.</p><p>·<strong>Контроль состояния горных склонов</strong>, выявление признаков обрушений и укрепление откосов с углом наклона 45–60 градусов.</p><p><strong>Подготовка и планировка площадок</strong>: срезка растительного слоя, планировка отметок, разработка и обратная засыпка канав, формирование насыпей и карт складирования.</p><p><strong>Набор и перемещение грунта</strong>: перенос грунта на короткие плечи, отсыпка валов, разравнивание, рекультивационные планировки.</p><p><strong>Работа с рыхлителем</strong>: выставление глубины и шага проходов, движение по диагонали к уклону.</p><p><strong>Взаимодействие с бригадами</strong>: работа по сигналам и радиосвязи с экскаваторами, самосвалами, грейдером, катком.</p><h2>Рабочий режим</h2><p>·<strong>Продолжительность смены</strong> — например, 11,5 часов.</p><p>·<strong>Технологические перерывы</strong> — для технического обслуживания и дозаправки. Они входят в рабочее время.</p><p>·<strong>Чередование операций</strong> — машинист выполняет чётко определённые технологические операции, смена операций может производиться от 2–4 раз за смену. </p><p>Нормы рабочего времени могут определяться на основе хронометражных наблюдений с учётом технических характеристик машины и навыков машиниста. </p><h2>Отдых</h2><p>·<strong>Перерыв для отдыха и питания</strong> —не менее 30 минут в течение смены. Время предоставления перерыва и его конкретная продолжительность устанавливаются правилами внутреннего трудового распорядка.</p><p>Требования:</p><p>Наличие удостоверения \"Машинист бульдозера\"</p><p>Опыт работы не менее 2-х лет</p><p>Обязанности:</p><p>Работы в соответствии со сменным техническим заданием.</p><p>Условия работы:</p><p>Вахтовый метод 30/30</p><p><br>\n</p><p><br>\n</p>", "requirements": "<p><u>Смотрят</u> 8 разряд, оффер подготовлен на 8 разряд (7 и 8 разряд одна зарплата) расчет на дневные смены</p><p><u>Бульдозера</u>: ТБУ - LIEBHERR PR-754, KOMATSU D-375, KOMATSU D-155, KOMATSU D-65, LIEBHERR PR-776, KOMATSU WD-600.</p><p><u>Документы</u>:Удостоверение тракториста-машиниста (особые отметки 8 разряд) </p><p><u>Опыт</u>: стабильный опыт на карьерах 3-х лет (год тоже смотрят) </p><p>В копию: Смирнов Николай Андреевич ; Соболев Олег Владимирович</p><p><br>\n</p><p><u>Воронка</u>: после рассмотрения у заказчика, тестирование и проверка СБ</p><p><br>\n</p><p><u>Медкомиссия</u>: Координатор или Анохина (ОТиПБ)</p><p><br>\n</p><p><u>Координатор</u>: Суханова</p><p><br>\n</p>", "entity": "ООО \"СУР\"", "ca мпетенций в оценочные процедуры и в учебные программы. </li><li>Владение современными форматами обучения и развития руководителей</li><li>Глубокое владение темами «Обратная связь», «Делегирование», «Управление эффективностью».</li><li>Успешный опыт проведения очных и онлайн тренингов для руководителей. </li><li>Владение современными форматами оценки руководителей (ассессменты, ИИ решения)</li><li>Опыт реализации программ для кадрового резерва (Top Talents) длительностью от 6+ месяцев.<br>\n</li></ol><p>Важные компетенции:</p><ol><li><strong>Системное мышление:</strong> видеть картину целиком - выстраивать систему обучения развития руководителей</li><li><strong>Управление стейкхолдерами:</strong> уметь выстраивать коммуникацию и вовлекать стейкхолдеров, создавать видимость проектов</li><li><strong>Стрессоустойчивость:</strong> готовность работать в высоком темпе и над несколькими проектами одновременно</li><li><strong>Agile формат работы:</strong> готовность работать по OKR и спринтам.</li><li><strong>Инновационность: </strong>уметь искать лучшие практики и изобретать кастомные решения</li></ol>", "entity": "ООО \"ВГК\"", "category": "Специалист", "city": "Южно-Сахалинск", "schedule": "Удалённо", "experience": "3-6 лет", "demand": 1, "links": [], "key_skills": [], "recruiter": "Домашинская Марина Викторовна", "recruiter_email": "domashinskayamv@eastmining.ru", "department": "Служба ЗГД по управлению персоналом (HR)", "director": "Ульянова Екатерина Андреевна"}, {"id": 1541699, "name": "Директор по внутренней складской логистике", "description": "", "responsibilities": "<p id=\"isPasted\"><strong>Цель роли</strong></p><p>Обеспечить системное, прозрачное и управляемое функционирование складского хозяйства с минимальными потерями, высокой точностью учета и едиными стандартами операционной деятельности на базе современных процессов и автоматизированных систем.</p><p><strong><br>\nКлючевые задачи</strong></p><p><strong>1. Наведение порядка и управляемости складской сети:</strong> переход от «хаоса» к контролируемой системе управления складами, обеспечение прозрачности процессов.</p><p><strong>2. Точность учета и борьба с потерями:&nbsp;</strong>системное снижение уровня недостач до нормативных значений (например, &lt; 0,5% от оборота);</p><ul><li>Внедрение контрольных точек на приемке, хранении и отгрузке.</li><li>Исключение практики «пост-проводок», «забытых накладных» и неотраженных операций.</li></ul><p><strong>3. Цифровизация и автоматизация процессов</strong></p><ul><li>Довнедрение и промышленный запуск WMS.</li><li>Внедрение единых стандартов (Унификация), единый регламент, адресное хранение</li><li>Обеспечение принципа: физическая операция невозможна без отражения в учетной системе (WMS/ERP).</li></ul><p><strong>4. Управление эффективностью операций</strong></p><ul><li>Повышение производительности складов.</li><li>Формирование системы KPI, мотивации и контроля качества выполнения операций.</li><li>Оптимизация складских процессов, логистических потоков и использования площадей.</li></ul><p><strong>5. Управление распределенной структурой</strong></p><ul><li>Формирование сильной управленческой команды среднего звена.</li><li>Обеспечение единых стандартов работы на всех площадках.</li></ul>", "requirements": "<p><br id=\"isPasted\"></p><p><strong>Требования к кандидату</strong></p><p><strong>Опыт и результаты</strong></p><ul><li>Подтвержденный опыт трансформации складской функции на складе от&nbsp;<strong>5000+ м²</strong> и/или с большим количеством SKU.</li><li>Реализованные кейсы:<ul><li>снижение недостач и потерь;</li><li>внедрение адресного хранения «с нуля»;</li><li>запуск или масштабирование WMS;</li><li>унификация процессов в сети складов.</li></ul></li></ul><p><strong>Профессиональная экспертиза</strong></p><ul><li>Глубокое понимание&nbsp;<strong>складских и логистических бизнес-процессов E2E</strong> и их кросс-функционального взаимодействия.</li><li>Опыт разработки регламентов, стандартов и нормативной документации.</li><li>Навыки построения прозрачной управленческой отчетности и системы KPI.</li></ul><p><strong>Управленческие компетенции</strong></p><ul><li>Опыт управления распределенной складской сетью.</li><li>Способность проводить организационные изменения и добиваться устойчивого результата.</li></ul><p><br>\n</p><p><br>\n</p>", "entity": "ООО \"ВГК\"", "category": "Руководитель", "city": "Южно-Сахалинск", "schedule": "Полный день", "experience": "Более 6 лет", "demand": 1, "links": [], "key_skills": [], "recruiter": "Кудинова Ольга Юрьевна", "recruiter_email": "kudinovaoy@eastmining.ru", "department": "Служба ЗГД по снабжению", "director": "Ситников Илья Константинович"}, {"id": 1541890, "name": "Докер-механизатор 3,4 класс", "description": "", "responsibilities": "<p>Для оффера</p><p><br>\n</p><ul><li>Погрузка, выгрузка и перегрузка всех видов грузов на суда;</li><li>Перегрузка грузов на рейде\"</li><li>Управление применяемыми подъёмно-транспортными и перегрузочными машинами и механизмами, проведение их ежесменного ТО;</li><li>Установка и замена грузозахватных приспособлений;</li><li>Зачистка трюмов судов;</li><li>Швартовка малого и большого флота;</li><li>Зачистка просыпей угля под конвейерами, уборка причалов.</li></ul><p><br>\n</p><p><br>\n</p><p><br>\n</p><p>Погрузка, выгрузка и перегрузка всех видов грузов на суда, в том числе перегрузка грузов на рейде, на складе, в автомобили с применением кранов одной группы, электропогрузчиков, лебедок (тельферов), транспортеров(конвейеров, шнеков, норий), трюмных, вагонных, складских и других машин с электроприводом, грузовых лифтов, одной из машин (механизмов)технологического оборудования (вибратора, виброрыхлителя, магнитного сепаратора и т.п.), автопогрузчиков грузоподъемностью до 10 т, тягачей (тракторов), бульдозеров (дизельных тягачей вагонов), тракторных погрузчиков (бульдозеров), экскаваторов одной группы, специальных судопогрузочных (разгрузочных) машин, трюмных, вагонных, складских специальных машин с приводом от двигателя внутреннего сгорания (ДВС), портальных пневмоперегружателей, швартовка малого и большого флота.</p>", "requirements": "<p>докер 4 класс</p>", "entity": "ООО \"УМПШ\"", "category": "Рабочий", "city": "Шахтерск", "schedule": "Вахта", "experience": "1-3 года", "demand": 21, "links": [], "key_skills": [], "recruiter": "Будницкая Юлия", "recruiter_email": "budnitskayayuv@eastmining.ru", "department": "Производственно-перегрузочный комплекс", "director": "Суртаев Виталий Александрович"}, {"id": 1543405, "name": "Сменный механик по ГТТ", "description": "", "responsibilities": "<p>текущий ремонт техники ГТТ, расстановка приоритетов по выполнению работ подрядчиков, составление актов дефекта, перемещение получение ТМЦ со склада, распределение сотрудников, выдача путевых листов, проведение технического осмотра силами операторов&nbsp;<br>\n</p>", "requirements": "<p>Образование: средне специальное техническое </p><p>Дополнительная квалификация:</p><p>Опыт работы:</p>", "entity": "ООО \"ВГК Транспортные системы\"", "category": "Специалист", "city": "Углегорск", "schedule": "Вахта", "experience": "3-6 лет", "demand": 1, "links": [], "key_skills": [], "recruiter": "Явтушенко Ирина Андреевна", "recruiter_email": "yavtushenkoia@eastmining.ru", "department": "Отдел грузовой механизации", "director": "Буриченко Евгений Анатольевич"}, {"id": 1543406, "name": "Начальник службы промышленной безопасности", "description": "", "responsibilities": "<p>Организовывать и координировать на предприятии работу по промышленной и пожарной безопасности, безопасности дорожного движения;</p><p>Организовывать контроль за соблюдением в структурных подразделениях законодательных и нормативных правовых актов по промышленной безопасности, ПБ и БДД;</p><p>Организовывать работу по расследованию ДТП, инцидентов и аварий, разрабатывать меры по их последующему предотвращению;</p><p>Организовывать проведение проверок сооружений, оборудования, машин и механизмов на соответствие их требованиям нормативных правовых актов по ПБ, ПрБ и БДД;</p><p>Разработка ЛНА.</p><p>Ведение бюджета.</p><p>В подчинении 6 человек. (средний возраст 40 лет).</p><p><br>\n</p><p>Задачи на испытательный срок:</p><p>Провести аудит</p><p>Вынести предложения по улучшениям.</p><p>Разобраться в процессах.</p><p>Составить краткосрочный и долгосрочный план.</p><p>Наладить связь с производством.</p><p>Настроить производственный процесс с точки зрения промбезопасности.</p><p><br>\n</p><p><br>\n</p><p><br>\n</p>", "requirements": "<p>Высшее техническое образование, приоритет - горное, электротехническое;</p><p><br>\n</p><p>Уверенное знание законодательных и нормативных правовых актов в области промышленной и пожарной безопасности, БДД;</p><p><br>\n</p><p>Опыт работы на аналогичной должности на промышленных предприятиях от 3-х лет.</p><p><br>\n</p><p>Реальный опыт управления командой, реальный опыт на крупных предприятиях с динамичными процессами, понимание процесса взаимодействия с производством.</p><p>Умение работать с компьютером. </p><p>Уверенный пользователь пакета MS Office.</p><p>Личные качества: ответственность, управленческие навыки, способность работать в быстром темпе.</p><p><br>\n</p><p><br>\n</p><p><br>\n</p><p>Горняк - приоритет.</p><p><br>\n</p>", "entity": "ООО \"СУР\"", "category": "Руководитель", "city": "Углегорск", "schedule": "Полный день", "experience": "3-6 лет", "demand": 1, "links": [], "key_skills": ["Руководство коллективом", "Стрессоустойчивость", "Лидерство", "Командообразование", "Разработка ППР", "Промышленная безопасность", "Безопасность"], "recruiter": "Жидина Наталья Васильевна", "recruiter_email": "zhidinanv@eastmining.ru", "department": "Служба заместителя директора по ОТиПБ", "director": "Братеньков Евгений Владимирович"}, {"id": 1543408, "name": "Инженер-гидрогеолог", "description": "", "responsibilities": "<p>Выполняет комплекс гидрогеологических и инженерно-геологических исследований при изучении недр, решении проектно-изыскательских и других инженерных задач.</p><p>Участвует в разработке плановой и проектно-сметной документации, а также в организации и ликвидации полевых работ.</p><p>Принимает участие в полевых работах для получения фактического материала по геологии, гидрогеологии и инженерной геологии изучаемого района.</p><p>Организует и проводит гидрогеологические наблюдения на сети режимных и наблюдательных скважин, действующих водозаборах, а также при поисках и разведке подземных вод.</p><p>Осуществляет одиночные и кустовые откачки воды из скважин, отбор проб воды и грунтов для лабораторных исследований, обрабатывает полученные результаты.</p><p>Выбирает конструкцию гидрогеологических скважин, участвует в их заложении и оборудовании водоподъемными средствами.</p><p>Обследует эксплуатационные скважины и водозаборы.</p><p>Проводит рекогносцировочное обследование намечаемого для изучения района работ или его отдельных участков, наблюдение экзогенных геологических процессов.</p><p>Обеспечивает соблюдение методических рекомендаций, руководств, инструкций и требований по проведению гидрогеологических и инженерно-геологических работ.</p><p>Ведет гидрогеологическую документацию.</p><p>Участвует в проведении камеральных работ.</p><p>Обрабатывает, анализирует и систематизирует результаты полевых работ.</p><p>Составляет графические материалы, характеризующие геологическое, гидрогеологическое и инженерно-геологическое строение изучаемого района (схемы, диаграммы, разрезы скважин и т.п.).</p><p>Участвует в подготовке материалов для обоснования заключений по гидрогеологическим и инженерно-геологическим вопросам.</p><p>Составляет отчеты о выполненных гидрогеологических и инженерно-геологических исследованиях.</p><p>Участвует в выполнении опытно-методических и тематических работ, а также во внедрении новой техники и технологии.</p><p>Обобщает материалы геологического фонда по гидрогеологии изучаемого района работ.</p><p>Принимает участие в оформлении и получении лицензий и документов на землепользование при проведении гидрогеологических работ, разрешений от других инстанций (санитарно-эпидемиологических станций, бассейнового надзора, лесничеств и др.).</p><p>Составляет и представляет в установленном порядке учетно-отчетные материалы по гидрогеологическим исследованиям.</p><p>Обеспечивает и контролирует соблюдение правил учета и хранения материалов гидрогеологических исследований, законодательства в области геологического изучения недр, недропользования, охраны недр и окружающей среды, правил охраны труда, противопожарной защиты на гидрогеологических работах.</p><p>Руководит работой техников-гидрогеологов и других исполнителей, занятых на гидрогеологических и инженерно-геологических работах.<br>\n</p>", "requirements": "<p>Образование: высшее профессиональное (геологическое) образование без предъявления требований к стажу работы или среднее профессиональное (геологическое) образование и стаж работы в должности техника-гидрогеолога не менее 3 лет.</p><p>Дополнительная квалификация:<br id=\"isPasted\">Должен знать:&nbsp;законы и иные нормативные правовые акты в области геологического изучения, использования и охраны недр и окружающей среды; организационно-распорядительные документы и методические материалы, касающиеся проведения гидрогеологических и инженерно-геологических работ; сведения о геологии, гидрогеологии и инженерной геологии исследуемого района и степени его изученности; перспективы развития гидрогеологических работ в регионе и в геологической организации; порядок проектирования, планирования и финансирования гидрогеологических работ; современные методы, организацию и средства проведения гидрогеологических и инженерно-геологических исследований; требования, предъявляемые к качеству и результатам гидрогеологических и инженерно-геологических работ; технологию и методику проведения гидрогеологических и инженерно-геологических работ; подсчет запасов подземных вод; виды применяемого геолого-разведочного (геофизического, гидрологического) оборудования, приборов, аппаратуры и правила их техническо
