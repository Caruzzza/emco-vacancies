ых машин", "description": "", "responsibilities": "<p>ремонт и обслуживание конвейерного оборудования, работы по ремонтам, замене и склейки лент на конвейерах </p>", "requirements": "<p>Образование: средне специальное</p><p>Дополнительная квалификация: техническое</p><p>Опыт работы:</p><p> за цикл<br>\nза вахту<br>\n38 824 за межвахту<br>\n1  за год</p>", "entity": "ООО \"ВГК Транспортные системы\"", "category": "Рабочий", "city": "Южно-Сахалинск", "schedule": "Вахта", "experience": "3-6 лет", "demand": 1, "links": [], "key_skills": [], "recruiter": "Заиграева Диана Евгеньевна", "recruiter_email": "zaigraevade@eastmining.ru", "department": "Служба технического директора", "director": "Буриченко Евгений Анатольевич"}, {"id": 1548950, "name": "PHP Developer", "description": "", "responsibilities": "<ul id=\"isPasted\"><ul id=\"isPasted\"><li><ul><li>Создание микросервисов обработки большого объема данных (события, временные ряды, геоданные).</li><li>Создание среды для быстрой настройки правил реагирования на события.</li><li>Создание отдельных микросервисов обработки определенных событий, в т.ч. с использованием статистических методов, машинного обучения и ИИ</li><li>будет плюсом опыт работы с GO/сhi/gorm/goose<br>\n</li></ul></li></ul></ul>", "requirements": "<ul id=\"isPasted\"><li>Опыт разработки на PHP с использованием Laravel от 3 лет</li><li>Знание работы с большими данными и оптимизации производительности</li><li>Опыт работы с Apache Kafka, PostgresSQL</li><li>Знание микросервисной архитектуры</li><li>Умение работать в команде по методологии SCRUM и решать сложные задачи</li></ul><p><strong>Будет плюсом:</strong></p><ul><li>Будет плюсом опыт работы с GO/сhi/gorm/goose</li></ul>", "entity": "ООО \"Операционное совершенство\"", "category": "Специалист", "city": "Москва", "schedule": "Полный день", "experience": "3-6 лет", "demand": 1, "links": [], "key_skills": [], "recruiter": "Кудинова Ольга Юрьевна", "recruiter_email": "kudinovaoy@eastmining.ru", "department": "Управление разработки и подготовки продуктов (Chief Product owner)", "director": "Нилова Алёна Андреевна"}, {"id": 1549003, "name": "HRBP СУР / производство", "description": "", "responsibilities": "<p>Требования:</p><ul><li>Опыт работы с рабочим и техническим персоналом. Понимание специфики подбора, обучения и схем мотивации</li><li>Опыт работы с руководителями и их развитие через индивидуальные беседы и обратную связь</li><li>Опыт разработки системных предложений по развитию вовлеченности, снижению текучести</li><li>Опыт оптимизации и упрощения мотивационных, сдельно-премиальных схем рабочего персонала</li><li>Опыт управления ФОТ, бюджетирования и оптимизации ФОТ. Опыт проактивного предложения идей по возможностям более «умного» управления ФОТом</li><li>Хорошие аналитические навыки, умение структурировать информацию</li><li>Критическое мышление</li><li>Умение находить язык и объяснять информацию разным целевым аудиториям (топ-менеджеры актива, рабочие)</li><li>Стрессоустойчивость</li><li>Умение аргументировать и влиять</li><li>Скорость и гибкость</li><li>Готовность работать в неструктурированной среде, при этом быстро и на результат</li><li>Отсутствие болезненного перфекционизма</li><li>Проактивность</li></ul><p>Обязанности:</p><ul><li>Формирование и реализация мероприятий по снижению текучести персонала: анализ причин, формирование плана мероприятий совместно с директорами и HRD СУРа</li><li>Контроль своевременного набора персонала, мероприятий по плавному «входу» в вахту, заездов и выездов</li><li>Обеспечение цикла управления персоналом в закрепленных подразделениях:<ul><li>Развитие и оптимизация организационных структур</li><li>Планирование численности персонала и разработка плана подбора</li><li>Планирование карьерных передвижений</li><li>Определение необходимости, планирование и проведение оценочных мероприятий при назначении сотрудников на новые позиции</li><li>Определение кратко и среднесрочных планов по развитию компетенций</li><li>Бюджетирование и управление ФОТ</li><li>Решение конфликтных ситуаций с сотрудниками</li><li>Поддержка в формировании индивидуальных планов развития</li><li>Поддержка в подготовке и сопровождении планов адаптации</li></ul></li><li>Оптимизация и улучшение премиальных схем оплаты труда</li><li>Контроль корректности начислений зарплат и премий, предложение и реализация корректирующих мер при ошибочных начислениях</li><li>Поддержка в подключении сотрудников к КЭДО</li><li>Разработка и внедрение мероприятий по развитию лояльности и вовлеченности персонала, фасилитация встреч по обсуждению опросов вовлеченности и планированию корректирующих действий</li><li>Реализация мероприятий по внедрению корпоративных ценностей</li><li>Планирование и проведение мероприятий по коммуникации и взаимодействию между руководителями и рабочими, контроль информированности рабочих по всем ключевым вопросам от их руководителей</li><li>Контроль обеспечения и обновления должностных инструкций и положений о подразделениях</li><li>Управление изменениями в вверенных подразделениях</li></ul><p>Условия работы:</p>", "requirements": "<p>Образование: высшее</p><p>Дополнительная квалификация: опытный пользователь Excel, знание 1С ЗУП (будет преимуществом)</p><p>Опыт работы:<br>\nЗнание Excel (сводные таблицы и ВПР).</p>", "entity": "ООО \"СУР\"", "category": "Специалист", "city": "Шахтерск", "schedule": "Полный день", "experience": "3-6 лет", "demand": 1, "links": [], "key_skills": [], "recruiter": "Кудинова Ольга Юрьевна", "recruiter_email": "kudinovaoy@eastmining.ru", "department": "Служба заместителя директора по управлению персоналом", "director": "Бурденко Наталья Геннадьевна"}, {"id": 1549025, "name": "Начальник управления по контролю за работой подрядных организаций", "description": "", "responsibilities": "<p id=\"isPasted\"><strong>1. Контроль исполнения договоров.</strong> Проверка соответствия фактически выполненных работ, срокам и условиям заключенных договоров и дополнительных соглашений.</p><p><strong>2. Проверка первичной документации</strong> (актов выполненных работ, путевых листов, счёт-фактур и т.д.) на предмет корректности заполнения и достоверности отражённых данных.</p><p><strong>3. &nbsp; Выездной контроль:</strong></p><p>3.1. Организация и проведения проверок на рабочих местах (объектах) подрядной техники для выявления ремонтных работ.&nbsp;</p><p>3.2. &nbsp;Анализ эффективности использования техники и ведение расчета коэффициента её использования.</p><p>3.3. &nbsp;Фото и видеофиксация процесса работ.</p><p><strong>4. &nbsp; Технологический мониторинг и анализ:</strong></p><p>4.1. Контроль работы подрядной техники с применением систем позиционирования (ГЛОНАСС/GPS/OES) для анализа маршрутов, простоев и режимов эксплуатации.</p><p>4.2. Анализ информации от систем СКУД для учёта времени нахождения персонала на территории предприятия.</p><p>4.3. Использования архива камер видеонаблюдения для разрешения спорных ситуаций и фиксаций нарушений.</p><p>5. &nbsp; Проверка наличия у машинистов подрядных организаций соответствующих документов (удостоверений, путевых листов, журналов, предрейсовых медицинских осмотров).</p><p><strong>6. &nbsp; Взаимодействие с подрядчиками:</strong></p><p>6.1. Ведение рабочей переписки по вопросам, входящих в компетенцию УКРПО.</p><p>6.2. Участие в очных встречах и переговорах для решения текущих вопросов.</p><p>6.3. Проведение предварительной претензионной работы.</p><p><strong>7. &nbsp; Взаимодействие с внутренними подразделениями:</strong></p><p>7.1. С договорным отделом – по вопросам заключения договоров, контроля оплаты.</p><p>7.2. С бухгалтерией и ПЭО – для согласования первичных документов перед оплатойи сверки данных.</p><p>7.3. С Юридическим отделом – для организации претензионной работы.</p><p>7.4. С отделом ОТ и ПБ – для совместных проверок соблюдения подрядчиками требований безопасности.</p><p><strong>8. &nbsp; Административно-управленческие функции (в рамках управления личным составом УКРПО и договорного отдела):</strong></p><p>8.1. Распределение обязанностей, контроль работы подчинённых.</p><p>8.2. Участие в подборе кадров, составление графика отпусков.</p><p>8.3. Разработка должностных инструкций специалистов подразделения.</p>", "requirements": "<p>Образование:</p><p>Дополнительная квалификация:</p><p>Опыт работы:</p>", "entity": "ООО \"СУР\"", "category": "Руководитель", "city": "Шахтерск", "schedule": "Полный день", "experience": "3-6 лет", "demand": 1, "links": [{"url": "https://hh.ru/vacancy/130907922", "type": "Headhunter"}], "key_skills": [], "recruiter": "Сидоренко Татьяна Владимировна", "recruiter_email": "sidorenkotv@eastmining.ru", "department": "Служба по контролю за работой подрядных организаций", "director": "Биденко Александр Александрович"}, {"id": 1549027, "name": "Заместитель начальника отдела охраны окружающей среды", "description": "", "responsibilities": "<p>Руководит разработкой и внедрением мероприятий, направленных на выполнение требований экологического законодательства по соблюдению стандартов и нормативов в области охраны окружающей среды, рационального использования природных ресурсов, создания экономики замкнутого цикла при проектировании, строительстве и эксплуатации новых объектов предприятия, а также расширении и реконструкции действующих производств.</p><p>Организует составление перспективных и текущих планов по охране окружающей среды, осуществляет контроль за их выполнением.</p><p>Принимает участие в разработке мер по обеспечению экологической чистоты выпускаемой продукции, ее безопасности для потребителей, созданию новых товаров и технологических процессов с улучшенными экологическими характеристиками.</p><p>Обеспечивает проведение экологической экспертизы технико-экономических обоснований, проектов, а также создаваемых новых технологий и оборудования, внедрение систем экологической маркировки продукции предприятия.</p><p>Руководит разработкой экологических стандартов и нормативов предприятия в соответствии с действующими государственными, международными (региональными) и отраслевыми стандартами, обеспечивает контроль за их выполнением и своевременный пересмотр.</p><p>Контролирует правильность эксплуатации очистных и защитных сооружений.</p><p>Разрабатывает меры по предотвращению загрязнения окружающей среды, соблюдению экологических норм, обеспечивающих благоприятные условия труда, а также по предупреждению возможности аварий и катастроф.</p><p>Участвует в разработке планов внедрения новой техники, проведения научно-исследовательских и опытных работ по созданию на предприятии экономики замкнутого цикла, основанной на экологически рациональной циркуляции материалов, сбережении и замещении невозобновляемых ресурсов, минимизации, повторном использовании, переработке и утилизации отходов, внедрении малоотходной, безотходной и экологически чистой технологии производства, рациональному использованию природных ресурсов, а также разработке планов капитального строительства по природоохранным объектам.</p><p>Проводит обоснованный расчет рисков для состояния окружающей среды при реализации предприятием программ по очистке и другим природоохранным мероприятиям.</p><p>Организует расследование причин и последствий выбросов вредных веществ в окружающую среду, подготавливает предложения по их предупреждению.</p><p>Руководит разработкой мер по улучшению охраны окружающей среды на основе изучения и обобщения передового опыта отечественных и зарубежных предприятий.</p><p>Организует ведение учета показателей, характеризующих состояние окружающей среды, создание системы хранения сведений о несчастных случаях, данных экологического мониторинга, документации по ликвидации отходов и прочей информации экологического характера, предоставляемой в распоряжение координатора природоохранной деятельности.</p><p>Проводит работу по созданию на предприятии эффективной системы экологической информации, распространяемой на всех уровнях управления, ознакомлению работников предприятия с требованиями экологического законодательства.</p><p>Участвует в аимодействие с инженерно-техническим персоналом (ИТР), обработка запросов на технику и организацию движения.</p><p>Ведение документации, подготовка отчетов, работа с автоматизированными системами (АСД, КХД).</p><p>Соблюдение требований безопасности, производственной дисциплины, знание мер при ЧС и норм охраны труда.<br>\nКурирует экскаваторы и бульдозеры.<br>\nв 06:40 утра и вечера планерка начинается до 07:30.<br>\nДиспетчер фиксирует в блокнот все, что было за прошлую смену и идут на работу к 08 часам и до 08.<br>\n2 дня в день, 2 дня в ночь и 4 дня выходных.<br>\nвносят в базу в 1С (конфигурация под диспетчеризацию сделана).<br>\nсвязывается по рации с каждым машинистам, кто где, когда и что планирует делать, сообщает ему задачи новые.<br>\nкабинетная работа.<br>\nконтроль за техникой и водителями (100-150 единиц техники)<br>\nконтроль за выполнением планов каждого работника. если кто-то выбивается из плана, уточнить причину, вызвать скорую помощь или мчс в случае необходимости.<br>\nмашинисты тоже информаруют.<br>\nопыт важен с горной диспетчеризацией.<br>\n</p><p>Опыт в горнодобывающей отрасли, знание структуры предприятия и технологий.</p><p>Навыки работы с производственными системами и документацией.</p><p>Ответственность, умение принимать решения в критических ситуациях.<br>\nдля сообщения в тг:<br>\n</p><p>Добрый день, [Имя кандидата]!</p><p>Меня зовут Галина, я рекрутер компании \"Восточная Горнорудная компания\".</p><p>Нашла ваше резюме на хх.ру, у вас отличный опыт в горной диспетчеризации. Хочу предложить роль Старшего горного диспетчера на проекте на Сахалине.</p><p><br>\n</p><p>О позиции:</p><p>Задачи: Оперативное управление сменой, координация 100–150 единиц техники (экскаваторы, бульдозеры), взаимодействие с машинистами по рации, контроль планов и безопасности.</p><p>График: 2 дня / 2 ночи / 4 выходных. Планерки утром и вечером, основная работа с 08:00.</p><p>Инструменты: Работа в 1С (специализированная конфигурация), ведение отчетности.</p><p><br>\ дела. Формирование плана закупок, контроль исполнения.</li></ul>", "requirements": "<p>Образование: Высшее, неполное высшее.</p><p>Дополнительная квалификация: Английский язык, средний, выше среднего</p><p>Опыт работы: от 5 лет.</p><p>Работа в 1С Ерп.</p>", "entity": "ООО \"ВГК\"", "category": "Руководитель", "city": "Москва", "schedule": "Полный день", "experience": "Более 6 лет", "demand": 1, "links": [], "key_skills": [], "recruiter": "Домашинская Марина Викторовна", "recruiter_email": "domashinskayamv@eastmining.ru", "department": "Служба ЗГД по снабжению", "director": "Афанасьев Иван Олегович"}, {"id": 1553211, "name": "Ведущий специалист направления закупок вспомогательной техники", "description": "", "responsibilities": "<ul id=\"isPasted\"><li>Отработка заявок на закупку запасных частей для ремонта ДВС Cummins, Komatsu. Закупка комплектующих для РВД. Узлов в сборе на различную технику&nbsp;от получения заявки до момента поступления на склад. Поиск поставщиков по всему миру.</li><li>Опыт внедрения категорийного управления.</li><li>Опыт организации складов консигнации.</li><li>Анализ потребности, формирование плана закупок, изучение рынка,&nbsp;</li><li>организация конкурных процедур, анализ результатов, ведение переговоров о получении наиболее выгодных коммерческих условий для компании,&nbsp;</li><li>Заключение договоров, контроль отгрузки, претензионная работа.</li></ul><p><br>\n</p><ul><li>Организация и сопровождение переговоров с участниками закупочных процедур, обеспечение наилучших условий закупки.</li><li>Выполнение поручения руководителя.</li><li>Выстраивание системной работы отдела. Формирование плана закупок, контроль исполнения.</li></ul>", "requirements": "<p>Образование: Высшее, неполное высшее.</p><p>Дополнительная квалификация: Английский язык, средний уровень владения.</p><p>Опыт работы: от 3 лет</p>", "entity": "ООО \"ВГК\"", "category": "Специалист", "city": "Москва", "schedule": "Полный день", "experience": "3-6 лет", "demand": 1, "links": [{"url": "https://hh.ru/vacancy/131270724", "type": "Headhunter"}], "key_skills": [], "recruiter": "Домашинская Марина Викторовна", "recruiter_email": "domashinskayamv@eastmining.ru", "department": "Служба ЗГД по снабжению", "director": "Афанасьев Иван Олегович"}, {"id": 1553751, "name": "Слесарь по обслуживанию и ремонту оборудования 3 разряда  ТБУ", "description": "", "responsibilities": "<p>Диагностика и выявление неисправностей тракторно-бульдозерной техники</p><p>Техническое обслуживание тракторно-бульдозерной техники&nbsp;</p><p>Замена узлов и агрегатов</p><p>Проведение ремонтных работ&nbsp;</p>", "requirements": "<p>Образование: средне-специальное профильное, высшее профильное</p><p>Дополнительная квалификация:</p><p>Опыт работы:&nbsp;от 1 года</p>", "entity": "ООО \"СУР\"", "category": "Рабочий", "city": "Углегорск", "schedule": "Сменный", "experience": "1-3 года", "demand": 2, "links": [], "key_skills": ["Ремонт автотранспорта"], "recruiter": "Явтушенко Ирина Андреевна", "recruiter_email": "yavtushenkoia@eastmining.ru", "department": "Управление тракторно-бульдозерной техники", "director": "Ерохин Михаил Анатольевич"}, {"id": 1553822, "name": "Водитель грузовой техники", "description": "", "responsibilities": "<p id=\"isPasted\">2.1. Управляет грузовыми автомобилями всех марок и типов, отнесенными к одной из категорий транспортных средств «В» или «С».</p><p>2.2. Заправляет автомобиль топливом, смазочными материалами и охлаждающей жидкостью.</p><p>2.3. Выезжает из гаража только по правильно оформленным путевым листам. Перед выездом на линию должен убедиться в полноте и правильности заполнения всех реквизитов путевого листа.</p><p>2.4. Проверяет техническое состояние автомобиля перед выездом на линию, подписывает путевой лист у главного механика о технически исправном состоянии автомобиля.</p><p>2.5. Проходит ежедневный предрейсовый медицинский осмотр.</p><p>2.6. Сдает автомобиль и ставит его на отведенное место по возвращении.</p><p>2.7. Устраняет возникшие во время работы на линии неисправности автомобиля.</p><p>2.8. Производит текущий ремонт автомобиля, проводит ежедневное обслуживание, первое и второе техническое обслуживание, готовит автомобиль к техническому осмотру.</p><p>2.9. Выполняет производственные задания, установленные главным инженером и&nbsp;главным механиком, не допускает простоев, срывов заявок.</p><p>2.10. Соблюдает правила дорожного движения и правила технической эксплуатации автомобилей.</p><p>2.11. Соблюдает правила эксплуатации аккумуляторных батарей и автомобильных шин, рационально использует горюче-смазочные материалы и запчасти к автомобилю.</p><p>2.12. Соблюдает нормы, правила, инструкции, приказы и указания по технике безопасности, пожарной безопасности и производственной санитарии.</p><p>2.13. Содержит в чистоте автомобиль, убирает территорию гаража и бытовое помещение.</p><p>2.14. Соблюдает правила подачи автомобилей под погрузку и разгрузку грузов, проверяет соответствие укладки и крепления груза на автомобиле требованиям безопасности движения и обеспечения сохранности автомобиля.</p><p>2.15. Соблюдает правила вежливости при общении с заказчиком.</p><p>2.16. Содержит в исправном состоянии набор ручного инструмента для аварийного ремонта автомобилей.</p><p>2.17. Содержит автомобиль в укомплектованном состоянии.</p><p>2.18. Соблюдает правила внутреннего трудового распорядка.</p><h3><br>\n</h3>", "requirements": "<p>Образование: среднее</p><p>Дополнительная квалификация: </p><p>Опыт работы:&nbsp;1-3</p>", "entity": "ООО \"СтройИнвестТехника\"", "category": "Рабочий", "city": "Шахтерск", "schedule": "Сменный", "experience": "1-3 года", "demand": 2, "links": [], "key_skills": [], "recruiter": "Сеченова Мария Александровна", "recruiter_email": "sechenovama@eastmining.ru", "department": "Нет управления/службы", "director": "Андрюнькин Олег Николаевич"}, {"id": 1553837, "name": "Начальник ДСК", "description": "", "responsibilities": "<p>Обеспечивает и контролирует выполнение плана производства по ДСК;<br>\n<ul>\n<li>Формирует наряды на производство работ, ведет журналы выдачи наряд-заданий и иную</li>\n</ul>\nдокументацию по организации и учету труда работников ДСК;<br>\n<ul>\n<li>Организовывает работы по диагностике технического состояния оборудования ДСК, выявлению</li>\n</ul>\nи учету дефектов в актах дефектовки;<br>\n<ul>\n<li>Готовит графики планово-предупредительных и текущих ремонтов оборудования ДСК;</p><p></li>\n</ul>\n</p><ul><li>Обеспечивать бесперебойную работу комплекса (круглосуточно, 2 смены, до 6000 кубов/сутки).</li><li>Контролировать качество щебня (фракции 40-70, 20-45, 20-60), загрузку сырья и отгрузку продукции.</li><li>Мониторить работу оборудования (конвейеры, дробилки, грохоты, пульт управления, автоматика).</li><li>Управлять персоналом (8 человек: 3 дробильщика + 1 оператор в смену), координировать зачистки, мелкий ремонт и безопасность.</li><li>Организовывать ТО, участвовать в планировании ремонтов с главным механиком, вести отчеты по объемам и простоям.</li><li>Координировать с погрузчиками и начальником смены по отгрузке, подбирать и обучать команду.</li></ul><p><br>\n</p><p><strong>Масштаб работы:</strong></p><p>∙ Комплекс: Китайский дробильно-сортировочный комплекс</p><p>∙ Производительность: до 6000 кубов в сутки (максимальная)</p><p>∙ Режим работы: круглосуточно, 2 смены, круглогодично</p><p>∙ Персонал в подчинении: 8 человек (по 4 человека в смену: 3 дробильщика + 1 оператор)</p><p>∙ Объем переработки: ~800 000 кубов камня в год превращается в щебень</p><p><strong>Оборудование ДСК:</strong></p><p>∙ Конвейерное оборудование (транспортировка материала).</p><p>∙ Дробильное оборудование (дробление камня).</p><p>∙ Бункера приемные и накопительные.</p><p>∙ Грохоты и сортировочное оборудование.</p><p>∙ Пульт управления комплексом.</p><p>∙ Система автоматизации.</p>", "requirements": "<p><strong>Требования:</strong><br>\n<ul>\n<li>Высшее техническое / Среднее специальное (•   Специальности: обогащение, механика, горное дело, машиностроение).</p><p>∙ От 2-3 лет работы на производстве</p><p>∙ Опыт работы на дробильно-сортировочном оборудовании (желательно)</p><p>∙ Опыт работы механиком, дробильщиком, оператором ДСК (подходит)</p><p>∙ Понимание принципов работы оборудования</p><p>∙ Готовность к круглосуточному режиму работы (возможны вызовы при авариях)</p><p>Два варианта:</p><p>1) Молодой специалист (2-3 года на производстве, опыт с ДСК желателен, лидерские качества, обучаемость).</p><p>2) Опытный (от 3 лет начальником/мастером ДСК в горной отрасли: карьер, уголь, золото).</li>\n<li>Понимание дробильно-сортировочного оборудования обязательно (конвейеры, дробилки, грохоты).</li>\n<li>Навыки управления сменой, организации ТО/ремонтов.</li>\n</ul>\n<strong>Знание программ/систем:</strong><br>\n<ul>\n<li>MS Office (базовый, для отчетов).</li>\n<li>Система мониторинга оборудования (желательно).</li>\n</ul>\n<strong>Личностные качества:</strong><br>\n<ul>\n<li>Активность</p><p>∙Быстрая обучаемость</p><p>∙Амбициозность </p><p>∙Лидерские качества (управление сменой)</p><p>∙Коммуникабельность</p><p>∙Ответственность</p><p>∙Организаторские способности</p></li>\n</ul>", "entity": "ООО «Никольский камень»", "category": "ИТР", "city": "Шахтерск", "schedule": "Полный день", "experience": "3-6 лет", "demand": 1, "links": [{"url": "https://hh.ru/vacancy/131025372", "type": "Headhunter"}, {"url": "https://hh.ru/vacancy/131025373", "type": "Headhunter"}], "key_skills": [], "recruiter": "Данцева Александра Юрьевна", "recruiter_email": "dantsevaay@eastmining.ru", "department": "Управление", "director": "Проданюк Елена Валентиновна "}, {"id": 1554661, "name": "Рабочий вахта Сахалин", "description": "", "responsibilities": "<p>уборка просыпи угля на конвейере ,уборка снега</p>", "requirements": "<p>Образование:</p><p>Дополнительная квалификация:</p><p>Опыт работы:</p><p><br>\n</p><p><br>\n</p>", "entity": "ООО \"ВГК Транспортные системы\"", "category": "Рабочий", "city": "Шахтерск", "schedule": "Вахта", "experience": "Б  правильное хранение уборочного инвентаря, контроль запаса моющих средств.</li><li><strong>Соблюдение стандартов:</strong> Строгое выполнение утверждённых графиков уборки, обязательное использование средств индивидуальной защиты (СИЗ) и обеспечение безопасности (установка знаков «Мокрый пол»).</li></ul>", "requirements": "<p id=\"isPasted\">Образование: не ниже среднего</p><p>Дополнительная квалификация: нет</p><p>Опыт работы: от 1 года</p>", "entity": "ООО \"ВГК Сервис\"", "category": "Рабочий", "city": "Шахтерск", "schedule": "Полный день", "experience": "1-3 года", "demand": 2, "links": [], "key_skills": [], "recruiter": "Явтушенко Ирина Андреевна", "recruiter_email": "yavtushenkoia@eastmining.ru", "department": "Блок заместителя исполнительного директора по проектам общественного питания и торговли", "director": "Кузнецова Любовь Игоревна"}, {"id": 1582156, "name": "Контент‑менеджер / SMM‑специалист", "description": "", "responsibilities": "<section data-markdown-raw=\"**Должность:** Контент‑менеджер / SMM‑специалист (HR‑бренд, Employer Branding)\" data-section-index=\"2\">Контент‑менеджер / SMM‑специалист (HR‑бренд, Employer Branding)</section><section data-markdown-raw=\"**Цель роли:** Рост узнаваемости бренда работодателя ВГК и притока кандидатов через сильный «живой» контент и стабильный контент‑продакшн.\" data-section-index=\"3\">Цель роли: Рост узнаваемости бренда работодателя ВГК и притока кандидатов через сильный «живой» контент и стабильный контент‑продакшн.</section><p><br>\n</p><p><br>\n</p>", "requirements": "<section data-markdown-raw=\"### Образование- Высшее/среднее профессиональное: маркетинг/журналистика/PR/медиа/HR/социология — как плюс.  - Допускается профиль «не по диплому», если есть сильное портфолио и кейсы.\" data-section-index=\"5\" id=\"isPasted\"><h3>Образование</h3><ul><li data-indent=\"0\">Высшее/среднее профессиональное: маркетинг/журналистика/PR/медиа/HR/социология — как плюс.</li><li data-indent=\"0\">Допускается профиль «не по диплому», если есть сильное портфолио и кейсы.</li></ul></section><section data-markdown-raw=\"### Дополнительная квалификация (желательно)- SMM/контент‑стратегия, видеопродакшн, сторителлинг, интервью.  - Аналитика соцсетей, performance для контента, работа с HR‑воронкой (бренд работодателя).\" data-section-index=\"6\"><h3>Дополнительная квалификация (желательно)</h3><ul><li data-indent=\"0\">SMM/контент‑стратегия, видеопродакшн, сторителлинг, интервью.</li><li data-indent=\"0\">Аналитика соцсетей, performance для контента, работа с HR‑воронкой (бренд работодателя).</li></ul></section><section data-markdown-raw=\"### Опыт работы- 1–3 года в SMM/контенте/видео (идеально — HR‑бренд, корпоративные коммуникации, медиа, производство/промышленность).  - Обязателен опыт регулярного выпуска видео‑контента (Reels/Clips/shorts) и ведения площадок.  - Плюс: опыт работы «в полях» (репортаж, съёмка на объектах, интервью).\" data-section-index=\"7\"><h3>Опыт работы</h3><ul><li data-indent=\"0\">1–3 года в SMM/контенте/видео (идеально — HR‑бренд, корпоративные коммуникации, медиа, производство/промышленность).</li><li data-indent=\"0\">Обязателен опыт регулярного выпуска видео‑контента (Reels/Clips/shorts) и ведения площадок.</li><li data-indent=\"0\">Плюс: опыт работы «в полях» (репортаж, съёмка на объектах, интервью).</li></ul></section><section data-markdown-raw=\"---\" data-section-index=\"8\"><hr></section><section data-markdown-raw=\"### Чем предстоит заниматься- **Управление каналами:** ведение карьерных страниц в ВК, внутренней экосистемы MAX, блогов на `vc.ru`, Дзен; тест и запуск новых площадок.  - **Контент‑продакшн полного цикла:** идеи → сценарии → съёмка на объектах/в офисе → монтаж → публикация. «Живой» контент вместо стоков.  - **Амбассадор / лицо бренда:** работа в кадре, интервью с сотрудниками, объяснение сложного простыми словами, создание доверия к компании.  - **Креатив и вовлечение:** контент, который обсуждают; рост ER и вовлечения; уход от шаблонных «мы открыли вакансию».  - **Data‑driven:** аналитика метрик (охваты, удержание, ER, переходы), понимание влияния контента на HR‑воронку (интерес → отклик → найм).  - **Постоянный upgrade:** идеи по трендам и форматам, предложения «как сделать лучше» и тестирование гипотез.\" data-section-index=\"9\"><h3>Чем предстоит заниматься</h3><ul><li data-indent=\"0\">Управление каналами: ведение карьерных страниц в ВК, MAX, блогов на vc.ru, Дзен, карьерного сайта, тест и запуск новых площадок.</li><li data-indent=\"0\">Контент‑продакшн полного цикла (в паре с другим SMM-специалистом): идеи → сценарии → съёмка на объектах/в офисе → монтаж → публикация. «Живой» контент вместо стоков.</li><li data-indent=\"0\">Амбассадор / лицо бренда: работа в кадре, интервью с сотрудниками, объяснение сложного простыми словами, создание доверия к компании.</li><li data-indent=\"0\">Креатив и вовлечение: контент, который обсуждают; рост ER и вовлечения; уход от шаблонных «мы открыли вакансию».</li><li data-indent=\"0\">Data‑driven: аналитика метрик (охваты, удержание, ER, переходы), понимание влияния контента на HR‑воронку (интерес → отклик → найм).</li><li data-indent=\"0\">Постоянный upgrade: идеи по трендам и форматам, предложения «как сделать лучше» и тестирование гипотез.</li></ul></section><section data-markdown-raw=\"---\" data-section-index=\"10\"><hr></section><section data-markdown-raw=\"### Что мы ждём от тебя- **Портфолио обязательно:** ссылки на видео (Reels/Clips) + тексты/кейсы (особенно `vc.ru`/Дзен).  - **Hard skills:** уверенный мобильный монтаж (CapCut/VN/и др.), базовый дизайн (Figma/Canva/Adobe — что используешь), понимание света/звука/кадра.  - **Аналитика:** умение собирать отчёты, делать выводы и предлагать действия (не просто «сколько лайков»).  - **Коммуникации и камера:** не боишься людей и объектива, умеешь быстро располагать к себе.  - **Без шаблонов:** нормальный живой язык, смысл и конкретика вместо клише.\" data-section-index=\"11\"><h3>Что мы ждём от тебя</h3><ul><li data-indent=\"0\">Портфолио обязательно: ссылки на видео (Reels/Clips) + тексты/кейсы (особенно vc.ru/Дзен).</li><li data-indent=\"0\">Hard skills: уверенный мобильный монтаж (CapCut/VN/и др.), базовый дизайн (Figma/Canva/Adobe — что используешь), понимание света/звука/кадра.</li><li data-indent=\"0\">Аналитика: умение собирать отчёты, делать выводы и предлагать действия (не просто «сколько лайков»).</li><li data-indent=\"0\">Коммуникации и камера: не боишься людей и объектива, умеешь быстро располагать к себе.</li><li data-indent=\"0\">Без шаблонов: нормальный живой язык, смысл и конкретика вместо клише.</li></ul><br id=\"isPasted\"><section data-markdown-raw=\"### Мы предложим&lt;br/&gt;- **Масштабные задачи** в компании‑лидере отрасли.  &lt;br/&gt;- **Команду**, открытую к экспериментам.  &lt;br/&gt;- **Командировки на объекты** (Сахалин и другие регионы) ради уникального контента.  &lt;br/&gt;- **  &lt;br/&gt;- **Ресурсы для роста** и реализации сильных идей.\" data-section-index=\"13\"><h3>Мы предложим</h3><ul><li data-indent=\"0\">Масштабные задачи в компании‑лидере отрасли.</li><li data-indent=\"0\">Команду, открытую к экспериментам.</li><li data-indent=\"0\">Командировки на объекты (Сахалин) ради уникального контента.</li><li data-indent=\"0\">Ресурсы для роста и реализации сильных идей.</li></ul></section><section data-markdown-raw=\"---\" data-section-index=\"14\"><hr></section><section data-markdown-raw=\"### Важно для отклика\" data-section-index=\"15\"><h3>Важно для отклика</h3></section><section data-markdown-raw=\"В сопроводительном письме:  &lt;br/&gt;- **ссылка на портфолио**  &lt;br/&gt;- и **какой контент‑проект считаешь главным достижением** (что сделал(а), результат в цифрах/эффект).\" data-section-index=\"16\">В сопроводительном письме:<ul><li data-indent=\"0\">ссылка на портфолио</li><li data-indent=\"0\">и какой контент‑проект считаешь главным достижением (что сделал(а), результат в цифрах/эффект).</li></ul></section><br>\n<p><br>\n</p></section>", "entity": "ООО \"ВГК\"", "category": "Специалист", "city": "Москва", "schedule": "Гибкий график", "experience": "1-3 года", "demand": 1, "links": [], "key_skills": [], "recruiter": "", "recruiter_email": "", "department": "Служба ЗГД по управлению персоналом (HR)", "director": "Дронова Олеся Игоревна"}, {"id": 1582272, "name": "Рабочий по ремонту и отделке помещений", "description": "", "responsibilities": "<p><br id=\"isPasted\">Требует навыков работы с различными материалами и инструментами. Производит техническое обслуживание согласно правилам эксплуатации и текущий ремонт закрепленных за ним объектов с выполнением всех видов ремонтных и строительных работ (плотницких, столярных). Ремонты текущие, косметические: квартир арендуемых (где проживают сотрудники компании), АБК, КПП. Поддерживает надлежащее санитарное состояние закрепленных за ним объектов.<br>\n</p>", "requirements": "<p>Образование: начальное, среднее профессиональное</p><p>Дополнительная квалификация:</p><p>Опыт работы:</p>", "entity": "ООО \"ВГК Сервис\"", "category": "Рабочий", "city": "Шахтерск", "schedule": "Полный день", "experience": "1-3 года", "demand": 1, "links": [], "key_skills": [], "recruiter": "", "recruiter_email": "", "department": "Административно-хозяйственный отдел", "director": "Мин Тамара Валерьевна"}, {"id": 1582565, "name": "Специалист по кадровому администрированию", "description": "", "responsibilities": "<p id=\"isPasted\">2.1. На Специалиста по кадровому администрированию возлагаются следующие обязанности:</p><p>2.1.1. Ведение учета личного состава обслуживаемых активов в соответствии с утвержденными в организации формами первичной учетной документации.</p><p>2.1.2. Своевременное, качественное оформление и отправка на ознакомление документов приема, перевода, увольнения работников, направления в служебные командировки, предоставления всех видов отпусков, привлечения к дисциплинарной ответственности, работы в выходной день и прочие документы.</p><p>2.1.3. При кадровых мероприятиях (прием, перевод) создает рабочее место согласно СОУТ и производит назначение рабочих мест сотрудникам.</p><p>2.1.4. При приеме на работу заполняет трудовую деятельность в разрезе организаций и должности на основании трудовой книжки кандидата или сведений о трудовой деятельности. Ведет учетов стажей.</p><p>2.1.5. Внесение информации о количественном, качественном составе работников и их движении в базу данных о персонале организации, своевременное обновление и пополнение данных.</p><p>2.1.6. Составление установленной отчетности в органы статистики, ЦЗ и прочие.</p><p id=\"isPasted\">2.1.7. Готовит справки по запросам работников, а также в СФР о назначении пенсии.</p><p>2.1.8. Формирование по заявкам выгрузок из информационных систем.</p><p>2.1.9. Участвует в заключении договоров ГПХ по статье бюджета 311. Акты выполненных работ направляет в ООО «ТФ» на оплату, формирует и отправляет отчет в СФР о начале и окончании договора в установленные законом сроки.</p><p>2.1.10. Осуществляет контроль своевременного составления табелей учета рабочего времени, их проверку и отправку на подписание.</p><p>2.1.11. Участвует и контролирует составление графиков отпусков. Отвечает за своевременное утверждение графиков. Направляет графики на ознакомление работникам. Контролирует их подписание работниками.</p><p>2.1.12. Контролирует соблюдение трудового законодательства.</p><p>2.1.13. Готовит и направляет в Социальный фонд России (СФР) в установленные законодательством сроки отчеты (ежедневные, ежемесячные и годовые), документы, в том числе ответы на запросы СФР.</p><p>2.2. Исполняет разовые устные и/или письменные задачи, поставленные руководителем единого кадрового центра обслуживания.</p><p>2.3. Участвует в проектах по унификации шаблонов документов, автоматизации процессов и прочих кадровых проектах, над которыми работает единый кадровый центр обслуживания.</p><p>2.4. Соблюдает трудовую и производственную дисциплины, правила и нормы охраны труда, промышленной, пожарной безопасности, промышленной санитарии и охраны окружающей среды. Обеспечивает соблюдение чистоты и порядка на своем рабочем месте.</p><p>2.5. Постоянно самостоятельно совершенствует профессиональные знания и навыки.</p><p>2.6. Взаимодействует с коллегами из смежных подразделений, ООО «ТФ», HRD/HR BP активов, руководителями СП, программистами и др. в рамках своевременного исполнения своих должностных обязанностей.</p>", "requirements": "<p>Образование: от среднего профессионального</p><p>Дополнительная квалификация:&nbsp;</p><p>Опыт работы: в отдел кадров промышленного предприятия, ОЦО</p>", "entity": "ООО \"ВГК\"", "category": "Специалист", "city": "Новосибирск", "schedule": "Полный день", "experience": "1-3 года", "demand": 1, "links": [], "key_skills": ["Клиентоориентированность", "Внимательность"], "recruiter": "Данилова Галина Геннадьевна", "recruiter_email": "danilovagg@eastmining.ru", "department": "Служба ЗГД по управлению персоналом (HR)", "director": "Сорокина Светлана Владимировна"}, {"id": 1582822, "name": "Матрос т/х \"Валерий Онищук\"/ Аварийная", "description": "", "responsibilities": "<p id=\"isPasted\">1.  Несение ходовой навигационной вахты;</p><p>2.  Несение стояночной вахты;</p><p>3.  Выполнение обязанностей, связанных со швартовкой судна и постановкой на якорь;</p><p>4.  Уход за корпусом судна, палубами, судовыми помещениями, якорным, грузовым, швартовным, буксирным устройствами, палубным оборудованием;</p><p>5.  Выполнение окрасочных, плотницких и столярных работ;</p><p>6.  Выполнение такелажных работ;</p><p>7.  Выполнение порученных обязанностей, связанных с приемом, размещением, креплением и со сдачей груза и багажа;</p><p>8.  Эксплуатация спасательных шлюпок и плотов, дежурных шлюпок.</p>", "requirements": "<p>Образование:</p><p>Дополнительная квалификация:</p><p>Опыт работы:</p>", "entity": "ООО \"УМПШ\"", "category": "Рабочий", "city": "Шахтерск", "schedule": "Сменный", "experience": "1-3 года", "demand": 1, "links": [{"url": "https://hh.ru/ function render(list){
  document.getElementById("cnt").textContent="Показано: "+list.length+" из "+J.length;

    var j=list[i];

    if(j.links)for(var k=0;k<j.links.length;k++){
      var l=j.links[k];
      var cls=l.type==="Headhunter"?"hh":l.type==="Career"?"career":"other";
      var txt=l.type==="Headhunter"?"Откликнуться на hh.ru":l.type==="Career"?"Карьерный сайт":"Откликнуться";

    if(j.recruiter)rc='<div class="rec-intro">Если у вас есть вопросы или вы хотите откликнуться — ниже контактные данные ответственного рекрутера:</div><div class="recruiter"><span>👤</span><div><span class="name">'+h(j.recruiter)+'</span>'+(j.recruiter_email?' — <a href="mailto:'+h(j.recruiter_email)+'">'+h(j.recruiter_email)+'</a>':'')+'</div></div>';
    var ir="";
    if(j.department||j.director){ir='<div class="info-row">';if(j.department)ir+='<div><span class="label">Управление / Служба:</span> '+h(j.department)+'</div>';if(j.director)ir+='<div><span class="label">Руководитель:</span> '+h(j.director)+'</div>';ir+='</div>';}
    out+='<div class="job-card" onclick="tog('+i+')">';
    out+='<h2>'+h(j.name)+'</h2>';
    out+='<div class="meta"><span class="tag tag-entity">'+h(j.entity)+'</span><span class="tag tag-cat">'+h(j.category)+'</span>';
    if(j.city)out+='<span class="tag tag-city">'+h(j.city)+'</span>';
    if(j.schedule)out+='<span class="tag tag-schedule">'+h(j.schedule)+'</span>';
    out+='</div>';
    out+=ir;
    if(j.demand>1)out+='<div class="demand">Мест: '+j.demand+'</div>';
    out+='<div class="details" id="d'+i+'">';

    out+=rc;
    
    out+='</div></div>';
  }
  document.getElementById("jl").innerHTML=out;
}
function applyF(){
  var en=document.getElementById("fE").value;
  var ca=document.getElementById("fC").value;
  var ci=document.getElementById("fCi").value;
  var s=document.getElementById("fS").value.toLowerCase();
  var res=[];
  for(var i=0;i<J.length;i++){
    var j=J[i];
    if(en&&j.entity!==en)continue;

    if(ci&&j.city!==ci)continue;

}
