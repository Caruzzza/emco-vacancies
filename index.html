<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вакансии — Восточная Горнорудная Компания</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
.header{background:#0a0a0a;padding:48px 20px 40px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(220,38,38,.08) 0%,transparent 50%,rgba(251,146,60,.05) 100%)}
.header-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:40px;justify-content:center}
.logo-text{font-size:1em;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.header h1{font-size:2.8em;text-align:center;font-weight:900;letter-spacing:-.02em;line-height:1.1;text-transform:uppercase;margin-bottom:12px}
.header h1 span{color:#ef4444}
.header p{font-size:1.05em;color:rgba(255,255,255,.6);text-align:center}
.header .count{display:inline-block;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);padding:6px 18px;border-radius:4px;margin-top:16px;font-size:.9em;font-weight:600;color:#ef4444}.header .count-wrap{text-align:center}
.filters{max-width:1200px;margin:0 auto;padding:20px 20px 0;display:flex;gap:10px;flex-wrap:wrap}
.filters select,.filters input{padding:10px 14px;border:1px solid rgba(255,255,255,.12);border-radius:6px;font-size:.9em;background:#1a1a1a;color:#fff;min-width:180px;font-family:inherit}
.filters select:focus,.filters input:focus{outline:none;border-color:rgba(239,68,68,.5)}
.filters input{flex:1;min-width:220px}
.filters .reset{padding:10px 18px;border:1px solid rgba(239,68,68,.4);border-radius:6px;background:transparent;color:#ef4444;cursor:pointer;font-size:.9em;font-family:inherit;font-weight:600}
.filters .reset:hover{background:rgba(239,68,68,.15)}
.counter{max-width:1200px;margin:0 auto;padding:12px 20px;font-size:.85em;color:rgba(255,255,255,.4)}
.jobs{max-width:1200px;margin:0 auto;padding:0 20px 60px}
.job-card{background:#141414;border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:24px;margin-bottom:12px;cursor:pointer;transition:all .2s}
.job-card:hover{border-color:rgba(239,68,68,.2);background:#1a1a1a}
.job-card h2{font-size:1.1em;font-weight:700;margin-bottom:8px}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.tag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:.78em;font-weight:600}
.tag-entity{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.tag-cat{background:rgba(251,146,60,.12);color:#fb923c;border:1px solid rgba(251,146,60,.2)}
.tag-city{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1)}
.tag-schedule{background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.08)}
.info-row{display:flex;gap:24px;flex-wrap:wrap;margin-top:6px;font-size:.85em;color:#fff}
.info-row .label{color:rgba(255,255,255,.6);font-weight:500}
.demand{font-size:.85em;color:rgba(255,255,255,.4);margin-top:4px}
.details{display:none;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,.08)}
.details.open{display:block}
.details h3{font-size:.85em;font-weight:700;color:#ef4444;text-transform:uppercase;letter-spacing:.05em;margin:20px 0 8px}
.details .desc{font-size:.9em;line-height:1.7;color:rgba(255,255,255,.7)}
.details .desc *{font-style:normal!important;font-family:inherit!important;font-size:inherit!important;color:inherit!important}
.details .desc strong{font-weight:600;color:rgba(255,255,255,.9)}
.details .desc ul{margin:8px 0 8px 20px}
.details .desc ul li{margin-bottom:4px;list-style-type:disc}
.details .desc p{margin-bottom:8px}
.rec-intro{margin-top:16px;font-size:.88em;color:rgba(255,255,255,.45);font-style:italic}
.recruiter{margin-top:8px;padding:14px 18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;display:flex;align-items:center;gap:12px;font-size:.9em}
.recruiter .name{font-weight:600}
.recruiter a{color:#f87171;text-decoration:none}
.recruiter a:hover{text-decoration:underline}
.links{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
.links a{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:6px;text-decoration:none;font-size:.9em;font-weight:600;font-family:inherit}
.links a.hh{background:#dc2626;color:#fff}.links a.hh:hover{background:#b91c1c}
.links a.career{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15)}
.links a.other{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.skills{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.skill{padding:3px 10px;border-radius:4px;font-size:.78em;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5)}
.no-results{text-align:center;padding:80px 20px;color:rgba(255,255,255,.3);font-size:1.1em}
.updated{max-width:1200px;margin:0 auto;padding:4px 20px 20px;font-size:.8em;color:rgba(255,255,255,.2);text-align:right}
@media(max-width:600px){.filters{flex-direction:column}.filters select,.filters input{min-width:100%;width:100%}.header h1{font-size:1.8em}.info-row{flex-direction:column;gap:4px}}
</style></head><body>

вис\"","category":"Руководитель","city":"Шахтерск","schedule":"Полный день","experience":"Без опыта","demand":1,"links":[{"url":"https://hh.ru/vacancy/130155976","type":"Headhunter"}],"key_skills":[],"recruiter":"Данцева Александра Юрьевна","recruiter_email":"dantsevaay@eastmining.ru","director":"Колодяжный Григорий Юрьевич","department":"ООО «ВГК Сервис»"},{"id":1528277,"name":"Управляющий рестораном","description":"","responsibilities":"<p>Опыт руководства в HoReCa — от 5 лет (желательно с опытом в караоке‑бизнесе). Инновации и не стандартный подход к бизнесу. Контроль выручки, себестоимости, ФОТ, бюджета, KPI. Контроль качества обслуживания, работы кухни/бара, соблюдения регламентов. Ритмичная работа и нацеленность на результат. Внедрение стандартов, оптимизация расходов, автоматизация. Акции, мероприятия, ведение соцсетей, работа с клиентской базой. </p><p>Подбор, адаптация, обучения, мотивация персонала. Распределение обязанностей, оценка эффективности сотрудников. KPI.</p><p>Знание нормативной и правовой базы. Контроль качества входной продукции и на выходе сервиса. Формирование меню, барной карты на основании тренда на рынке.</p><p>Стратегическое планирование, анализ рынка и конкурентов, продуктовая и барная матрица. Маркетинговые инициативы. Оптимизация процессов. Знание инструментов отчетности 1С, iiko, POS. Взаимодействие с подразделениями компании. Коммуникабельность, аналитическое мышление, инициативность, самостоятельность, стрессоустойчивость.</p><p><br></p>","requirements":"<p>Образование:</p><p>Дополнительная квалификация:</p><p>Опыт работы:</p>","entity":"ООО \"ВГК Сервис\"","category":"Руководитель","city":"Шахтерск","schedule":"Полный день","experience":"Без опыта","demand":1,"links":[{"url":"https://hh.ru/vacancy/130650443","type":"Headhunter"}],"key_skills":[],"recruiter":"Сидоренко Татьяна Владимировна","recruiter_email":"sidorenkotv@eastmining.ru","director":"Лысенко Илья Русланович","department":"ООО «ВГК Сервис»"},{"id":1533082,"name":"Кладовщик ГСМ","description":"","responsibilities":"<p>Образование:</p><p>Дополнительная квалификация:</p><p>Опыт работы:</p>","requirements":"","entity":"ООО \"СУР\"","category":"Специалист","city":"Шахтерск","schedule":"Вахта","experience":"1-3 года","demand":16,"links":[{"url":"https://hh.ru/vacancy/131331214","type":"Headhunter"},{"url":"https://emco.potok.io/open/jobs/1533082","type":"Career"}],"key_skills":[],"recruiter":"Заиграева Диана Евгеньевна","recruiter_email":"zaigraevade@eastmining.ru","director":"Цветков Алексей Игоревич","department":"ООО \"СУР\""},{"id":1533406,"name":"Технический директор по флоту","description":"","responsibilities":"<p>Мониторинг технического состояния судов, механизмов, электрооборудования и средств навигации.</p><p>Обеспечение технической готовности флота к работе и минимизация простоев.</p><p>Организация классификационных освидетельствований, инспекторских осмотров.</p><p>Планирование, организация и контроль текущих, плановых и доковых ремонтов.</p><p>Управление проектами переоборудования и модернизации судов.</p><p>Организация поставок запчастей, материалов и технического снабжения.</p><p>Подготовка технической документации.</p><p>Контроль соблюдения международных конвенций, государственных законов и правил безопасности.</p><p>Руководство службой эксплуатации флота.</p><p>Учет и анализ эксплуатационного бюджета, поиск вариантов снижения затрат.</p><p>Взаимодействие с судоремонтными предприятиями и подрядчиками.</p>","requirements":"<p>морское техническое образование в объеме программ признанных и полномочных на то учебных заведений и опыт работы в должности старшего механика морского судна, или на руководящей должности (по профильной специальности) работы в судоходных компаниях;<br></p>","entity":"ООО \"УМПШ\"","category":"Руководитель","city":"Шахтерск","schedule":"Полный день","experience":"3-6 лет","demand":1,"links":[{"url":"https://hh.ru/vacancy/131058825","type":"Headhunter"},{"url":"https://hh.ru/vacancy/131058826","type":"Headhunter"}],"key_skills":[],"recruiter":"Кондратова Василина Вадимовна","recruiter_email":"kondratovavv@eastmining.ru","director":"Герасименко Петр Владимирович","department":"ООО \"УМПШ\""},{"id":1533497,"name":"Старший помощник капитана (Сахалинская область)","description":"","responsibilities":"<ol><li>Обеспечение безопасности плавания судна, безопасной перевозки грузов.</li><li>Выполнение на судне грузоперевозок и/или швартовых операций.</li><li>Организация соблюдения требований по охране окружающей среды.</li><li>Обеспечение функционирования системы управления охраной труда на судне. </li><li>Соблюдение требований транспортной безопасности. </li><li>Организация документооборота на судне.</li></ol>","requirements":"<p>Образование: Судоводитель</p><p>Рабочий диплом свыше 500 регистровых тонн (валовая вместимость Онищука 1700тонн), т.е. если будет ограничение до 3000тонн, тоже подходит. </p><p><br></p>","entity":"ООО \"УМПШ\"","category":"Специалист","city":"Шахтерск","schedule":"Полный день","experience":"3-6 лет","demand":1,"links":[{"url":"https://hh.ru/vacancy/131366323","type":"Headhunter"},{"url":"https://hh.ru/vacancy/131366324","type":"Headhunter"}],"key_skills":[],"recruiter":"Сидоренко Татьяна Владимировна","recruiter_email":"sidorenkotv@eastmining.ru","director":"Лопарев Сергей Владимирович","department":"ООО \"УМПШ\""},{"id":1535638,"name":"Лидер сообщества Совета Ветеранов","description":"","responsibilities":"<p><strong><span>Лидер организации сообщества ветеранов / \"Батяня\"</span></strong></p><p><strong>Локация:</strong> Южно-Сахалинск или Шахтерск</p><p><strong>Прямое подчинение:</strong> ТОП-менеджмент компании (Босой или Бородин).</p><h3>О ПРОЕКТЕ</h3><p>ВГК — это 5000 сотрудников и ответственность за весь Углегорский район. Мы понимаем: возвращение бойцов к мирной жизни не решается выплатами. Оно решается через <strong>смысл, команду и новую профессию</strong>. Мы запускаем комплексную программу ресоциализации, основанную на лучших мировых практиках по работе с ветеранами военных действий. Нам нужен человек, который возглавит этот процесс на месте и станет для ветеранов настоящим «отцом-командиром».</p><p><br>ТВОЯ МИССИЯ</p><p>Выстроить «Маршрут возвращения» для бойцов: от первой встречи до закрепления в новой профессии на предприятиях ВГК. Ты должен стать мостом между боевым прошлым человека и его стабильным трудовым будущим.</p><h3>ЧТО НУЖНО БУДЕТ ДЕЛАТЬ (ЗАДАЧИ)</h3><ul><li><strong>Стать лицом программы:</strong> Проводить установочные встречи, объяснять правила «Контракта взаимных обязательств» (мы даем обучение и работу — боец дает дисциплину и готовность расти).</li><li><strong>Сформировать сообщество:</strong> Организовать «Ветеран-центр» как точку сборки. Создать атмосферу «свои среди своих», где есть структура и взаимовыручка.</li><li><strong>Управлять треками адаптации:</strong> Совместно с HR и производством курировать переобучение ветеранов на востребованные в ВГК профессии (водители большегрузов, механики, операторы).</li><li><strong>Реализовывать «Проекты со смыслом»:</strong> Организовать участие ветеранов в жизни района (помощь семьям погибших, благоустройство, наставничество) — работа через действие, а не через пособия.</li><li><strong>Держать дисциплину:</strong> Быть фильтром на входе. Отсеивать тех, кто не готов, и поддерживать тех, кто хочет выбраться.</li></ul><h3>КТО ТЫ</h3><ul><li><strong>Мужчина с реальным боевым опытом.</strong> Ты говоришь с ветеранами на одном языке, знаешь, что такое ПТСР и дезадаптация не по учебникам.</li><li><strong>Офицер (полковник / подполковник в запасе).</strong> Тебе не нужно объяснять, что такое субординация, ответственность за личный состав и управление ресурсами.</li><li><strong>Управленец.</strong> Ты умеешь планировать, отчитываться за результат и взаимодействовать с гражданскими структурами (GR).</li><li><strong>Твоя мотивация</strong> — не просто «занять должность», а реально помочь ветерану найти себя в мирной жизни под крылом сильного работодателя.</li></ul><h3>ЧТО МЫ ПРЕДЛАГАЕМ</h3><ul><li><strong>Ресурс крупнейшего холдинга:</strong> У тебя будет бюджет, пространство для центра, поддержка службы безопасности и учебного комбината ВГК.</li><li><strong>Работа на результат:</strong> Мы не требуем пафосных отчетов. Нам нужны люди, которые вышли на смены и закрепились в семьях.</li><li><strong>Масштаб:</strong> Пилот в Углегорске должен стать федеральным стандартом. Ты будешь тем, кто его создал.</li><li><strong>Условия:</strong> Д��стойный уровень дохода (обсуждается индивидуально), полная поддержка при релокации на Сахалин, жилье и служебный транспорт.</li></ul><hr><h3>ПОЧЕМУ ЭТО ВАЖНО</h3><p>Мы инвестируем в возвращение Людей к нормальной жизни. Если ты готов взять ответственность за «Вторую смену» наших героев — мы ждем тебя.</p><p><br></p><p><br></p><p>С 0 создать Сообщество Ветеранов.</p><p>Развитие карьерных треков, создание условий для социализации ребят прошедших СВО.</p><p>Психологическая реабилитация, мотивация на развитие ребят.</p><p>Поддержка ребят прошедших СВО.</p><p><br></p><p>Смотрят кандидатов : Босой и Бородин.</p><p><br></p><h3><span>1. Мотивация и личная вовлечённость</span></h3><ul><li><span>Почему вы хотите возглавить Совет ветеранов? Что для вас значит эта работа?</span></li><li><span>Имеете ли вы личный опыт (военная служба, работа с ветеранами, семья ветеранов)? Как это повлияло на ваше отношение к теме?</span></li></ul><h3><span>2. Лидерские и организационные навыки</span></h3><ul><li><span>Какой у вас опыт руководства коллективами?</span></li><li><span>Как вы будете выстраивать работу с неоднородной группой (ветераны разных родов войск, возрастов, состояния здоровья)?</span></li><li><span>Приведите пример, когда вам удалось сплотить группу вокруг общей цели.</span></li><li><span>Как будете распределять обязанности между членами Совета? Как мотивировать волонтёров?</span></li></ul><div><br></div><h3><span>3. Работа с проблемами ветеранов</span></h3><ul><li><span>Какие, на ваш взгляд, главные проблемы ветеранов в нашем регионе/организации?</span></li><li><span>Как будете отстаивать интересы ветеранов перед администрацией, органами власти, работодателями?</span></li><li><span>Как подойдёте к решению конфликтной ситуации между ветеранами или между ветераном и администрацией?</span></li></ul><div><br></div><h3><span>4. Организация деятельности Совета</span></h3><ul><li><span>Какие мероприятия считаете приоритетными (памятные даты, соцподдержка, досуг, медпомощь)?</span></li><li><span>Как будете вести документацию, планирование, отчётность Совета?</span></li></ul><ul><li><span>Какие каналы коммуникации предложите для связи с членами Совета (особенно маломобильными)?</span></li></ul><div><br></div><h3><span>5. Работа с внешними структурами</span></h3><ul><li><span>Какой у вас опыт взаимодействия с администрацией, соцзащитой, волонтёрскими организациями?</span></li><li><span>Как будете привлекать ресурсы ( гранты, волонтёры)?</span></li><li><span>Как организуете подготовку документов для получения льгот/поддержки для конкретных ветеранов?</span></li></ul><h3><span>7. Видение развития</span></h3><ul><li><span>Каким вы видите Совет ветеранов через год при вашем руководстве?</span></li><li><span>Какие новые форматы работы с ветеранами хотели бы внедрить?</span></li><li><span>Как будете сохранять преемственность и передавать опыт новым поколениям?</span></li></ul><div><br></div><div><hr></div><div><br></div><div><strong><span>Рекомендация:</span></strong><span> Обратите внимание на:</span></div><ul><li><span>Эмпатию и уважение к разным поколениям</span></li><li><span>Практическую смекалку (часто ресурсов мало — нужны креативные решения)</span></li><li><span>Стрессоустойчивость (работа с людьми с травмами, потерями требует выдержки)</span></li><li><span>Готовность к «мелочам» — оформление справок, сопровождение в поликлинику и т.д.</span></li></ul><p><br></p><p><br></p>","requirements":"<p>Супер идейный, Лидер.</p><p>Со��ты: лидерство, умение вести Контроль исполнения договоров.</strong> Проверка соответствия фактически выполненных работ, срокам и условиям заключенных договоров и дополнительных соглашений.</p><p><strong>2. Проверка первичной документации</strong> (актов выполненных работ, путевых листов, счёт-фактур и т.д.) на предмет корректности заполнения и достоверности отражённых данных.</p><p><strong>3.   Выездной контроль:</strong></p><p>3.1. Организация и проведения проверок на рабочих местах (объектах) подрядной техники для выявления ремонтных работ. </p><p>3.2.  Анализ эффективности использования техники и ведение расчета коэффициента её использования.</p><p>3.3.  Фото и видеофиксация процесса работ.</p><p><strong>4.   Технологический мониторинг и анализ:</strong></p><p>4.1. Контроль работы подрядной техники с применением систем позиционирования (ГЛОНАСС/GPS/OES) для анализа маршрутов, простоев и режимов эксплуатации.</p><p>4.2. Анализ информации от систем СКУД для учёта времени нахождения персонала на территории предприятия.</p><p>4.3. Использования архива камер видеонаблюдения для разрешения спорных ситуаций и фиксаций нарушений.</p><p>5.   Проверка наличия у машинистов подрядных организаций соответствующих документов (удостоверений, путевых листов, журналов, предрейсовых медицинских осмотров).</p><p><strong>6.   Взаимодействие с подрядчиками:</strong></p><p>6.1. Ведение рабочей переписки по вопросам, входящих в компетенцию УКРПО.</p><p>6.2. Участие в очных встречах и переговорах для решения текущих вопросов.</p><p>6.3. Проведение предварительной претензионной работы.</p><p><strong>7.   Взаимодействие с внутренними подразделениями:</strong></p><p>7.1. С договорным отделом – по вопросам заключения договоров, контроля оплаты.</p><p>7.2. С бухгалтерией и ПЭО – для согласования первичных документов перед оплатойи сверки данных.</p><p>7.3. С Юридическим отделом – для организации претензионной работы.</p><p>7.4. С отделом ОТ и ПБ – для совместных проверок соблюдения подрядчиками требований безопасности.</p><p><strong>8.   Административно-управленческие функции (в рамках управления личным составом УКРПО и договорного отдела):</strong></p><p>8.1. Распределение обязанностей, контроль работы подчинённых.</p><p>8.2. Участие в подборе кадров, составление графика отпусков.</p><p>8.3. Разработка должностных инструкций специалистов подразделения.</p>","requirements":"<p>Образование:</p><p>Дополнительная квалификация:</p><p>Опыт работы:</p>","entity":"ООО \"СУР\"","category":"Руководитель","city":"Шахтерск","schedule":"Полный день","experience":"3-6 лет","demand":1,"links":[{"url":"https://hh.ru/vacancy/130907922","type":"Headhunter"}],"key_skills":[],"recruiter":"Сидоренко Татьяна Владимировна","recruiter_email":"sidorenkotv@eastmining.ru","director":"Биденко Александр Александрович","department":"ООО \"СУР\""},{"id":1549027,"name":"Заместитель начальника отдела охраны окружающей среды","description":"","responsibilities":"<p>Руководит разработкой и внедрением мероприятий, направленных на выполнение требований экологического законодательства по соблюдению стандартов и нормативов в области охраны окружающей среды, рационального использования природных ресурсов, создания экономики замкнутого цикла при проектировании, строительстве и эксплуатации новых объектов предприятия, а также расширении и реконструкции действующих производств.</p><p>Организует составление перспективных и текущих планов по охране окружающей среды, осуществляет контроль за их выполнением.</p><p>Принимает участие в разработке мер по обеспечению экологической чистоты выпускаемой продукции, ее безопасности для потребителей, созданию новых товаров и технологических процессов с улучшенными экологическими характеристиками.</p><p>Обеспечивает проведение экологической экспертизы технико-экономических обоснований, проектов, а также создаваемых новых технологий и оборудования, внедрение систем экологической маркировки продукции предприятия.</p><p>Руководит разработкой экологических стандартов и нормативов предприятия в соответствии с действующими государственными, международными (региональными) и отраслевыми стандартами, обеспечивает контроль за их выполнением и своевременный пересмотр.</p><p>Контролирует правильность эксплуатации очистных и защитных сооружений.</p><p>Разрабатывает меры по предотвращению загрязнения окружающей среды, соблюдению экологических норм, обеспечивающих благоприятные условия труда, а также по предупреждению возможности аварий и катастроф.</p><p>Участвует в разработке планов внедрения новой техники, проведения научно-исследовательских и опытных работ по созданию на предприятии экономики замкнутого цикла, основанной на экологически рациональной циркуляции материалов, сбережении и замещении невозобновляемых ресурсов, минимизации, повторном использовании, переработке и утилизации отходов, внедрении малоотходной, безотходной и экологически чистой технологии производства, рациональному использованию природных ресурсов, а также разработке планов капитального строительства по природоохранным объектам.</p><p>Проводит обоснованный расчет рисков для состояния окружающей среды при реализации предприятием программ по очистке и другим природоохранным мероприятиям.</p><p>Организует расследование причин и последствий выбросов вредных веществ в окружающую среду, подготавливает предложения по их предупреждению.</p><p>Руководит разработкой мер по улучшению охраны окружающей среды на основе изучения и обобщения передового опыта отечественных и зарубежных предприятий.</p><p>Организует ведение учета показателей, характеризующих состояние окружающей среды, создание системы хранения сведений о несчастных случаях, данных экологического мониторинга, документации по ликвидации отходов и прочей информации экологического характера, предоставляемой в распоряжение координатора природоохранной деятельности.</p><p>Проводит работу по созданию на предприятии эффективной системы экологической информации, распространяемой на всех уровнях управления, ознакомлению работников предприятия с     out+='<div class="job-card" onclick="tog('+i+')">';

    out+='</div>';
