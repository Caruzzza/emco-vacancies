<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вакансии — Восточная Горнорудная Компания</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
.header{background:#0a0a0a;padding:48px 20px 40px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(220,38,38,.08) 0%,transparent 50%,rgba(251,146,60,.05) 100%)}
.header-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:40px;justify-content:center}
.logo-text{font-size:1em;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.header h1{font-size:2.8em;text-align:center;font-weight:900;letter-spacing:-.02em;line-height:1.1;text-transform:uppercase;margin-bottom:12px}
.header h1 span{color:#ef4444}
.header p{font-size:1.05em;color:rgba(255,255,255,.6);text-align:center}
.header .count{display:inline-block;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);padding:6px 18px;border-radius:4px;margin-top:16px;font-size:.9em;font-weight:600;color:#ef4444}.header .count-wrap{text-align:center}
.filters{max-width:1200px;margin:0 auto;padding:20px 20px 0;display:flex;gap:10px;flex-wrap:wrap}
.filters select,.filters input{padding:10px 14px;border:1px solid rgba(255,255,255,.12);border-radius:6px;font-size:.9em;background:#1a1a1a;color:#fff;min-width:180px;font-family:inherit}
.filters select:focus,.filters input:focus{outline:none;border-color:rgba(239,68,68,.5)}
.filters input{flex:1;min-width:220px}
.filters .reset{padding:10px 18px;border:1px solid rgba(239,68,68,.4);border-radius:6px;background:transparent;color:#ef4444;cursor:pointer;font-size:.9em;font-family:inherit;font-weight:600}
.filters .reset:hover{background:rgba(239,68,68,.15)}
.counter{max-width:1200px;margin:0 auto;padding:12px 20px;font-size:.85em;color:rgba(255,255,255,.4)}
.jobs{max-width:1200px;margin:0 auto;padding:0 20px 60px}
.job-card{background:#141414;border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:24px;margin-bottom:12px;cursor:pointer;transition:all .2s}
.job-card:hover{border-color:rgba(239,68,68,.2);background:#1a1a1a}
.job-card h2{font-size:1.1em;font-weight:700;margin-bottom:8px}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.tag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:.78em;font-weight:600}
.tag-entity{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.tag-cat{background:rgba(251,146,60,.12);color:#fb923c;border:1px solid rgba(251,146,60,.2)}
.tag-city{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1)}
.tag-schedule{background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.08)}
.info-row{display:flex;gap:24px;flex-wrap:wrap;margin-top:6px;font-size:.85em;color:#fff}
.info-row .label{color:rgba(255,255,255,.6);font-weight:500}
.demand{font-size:.85em;color:rgba(255,255,255,.4);margin-top:4px}
.details{display:none;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,.08)}
.details.open{display:block}
.details h3{font-size:.85em;font-weight:700;color:#ef4444;text-transform:uppercase;letter-spacing:.05em;margin:20px 0 8px}
.details .desc{font-size:.9em;line-height:1.7;color:rgba(255,255,255,.7)}
.details .desc *{font-style:normal!important;font-family:inherit!important;font-size:inherit!important;color:inherit!important}
.details .desc strong{font-weight:600;color:rgba(255,255,255,.9)}
.details .desc ul{margin:8px 0 8px 20px}
.details .desc ul li{margin-bottom:4px;list-style-type:disc}
.details .desc p{margin-bottom:8px}
.rec-intro{margin-top:16px;font-size:.88em;color:rgba(255,255,255,.45);font-style:italic}
.recruiter{margin-top:8px;padding:14px 18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;display:flex;align-items:center;gap:12px;font-size:.9em}
.recruiter .name{font-weight:600}
.recruiter a{color:#f87171;text-decoration:none}
.recruiter a:hover{text-decoration:underline}
.links{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
.links a{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:6px;text-decoration:none;font-size:.9em;font-weight:600;font-family:inherit}
.links a.hh{background:#dc2626;color:#fff}.links a.hh:hover{background:#b91c1c}
.links a.career{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15)}
.links a.other{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.skills{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.skill{padding:3px 10px;border-radius:4px;font-size:.78em;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5)}
.no-results{text-align:center;padding:80px 20px;color:rgba(255,255,255,.3);font-size:1.1em}
.updated{max-width:1200px;margin:0 auto;padding:4px 20px 20px;font-size:.8em;color:rgba(255,255,255,.2);text-align:right}
@media(max-width:600px){.filters{flex-direction:column}.filters select,.filters input{min-width:100%;width:100%}.header h1{font-size:1.8em}.info-row{flex-direction:column;gap:4px}}
</style></head><body>

 по тоннажу судна, или без, а также имеющее диплом оператора ГМССБ соответствующего района плавания, свидетельства о прохождении специальных подготовок, УЛМ, мореходная книжка, медицинская комиссия.<br></p>","entity":"ООО \"УМПШ\"","category":"Специалист","city":"Шахтерск","schedule":"Полный день","experience":"3-6 лет","demand":1,"links":[],"key_skills":[],"recruiter":"Сидоренко Татьяна Владимировна","recruiter_email":"sidorenkotv@eastmining.ru","department":"ООО \"УМПШ\"","director":"Лопарев Сергей Владимирович"},{"id":1535229,"name":"Вахтенный помощник капитана Новое судно 1/ посадка 05.06.2026","description":"","responsibilities":"<p>1. ��беспечение безопасности плавания судна, безопасной перевозки грузов.</p><p>2. Выполнение на судне грузоперевозок и/или швартовых операций.</p><p>3. Участие в обеспечении функционирования системы управления охраной труда на судне.</p><p>5. Соблюдение требований транспортной безопасности. </p><p>6. Организация продовольственного снабжения на судне.</p><p>7. Контроль за техническим состоянием</p>","requirements":"<p>Наличие среднего, или высшее профессионального образования в области судовождения, действующий рабочий диплом вахтенного помощника капитана с ограничениями по тоннажу судна, или без, а также имеющее диплом оператора ГМССБ соответствующего района плавания, свидетельства о прохождении специальных подготовок, УЛМ, мореходная книжка, медицинская комиссия.<br></p>","entity":"ООО \"УМПШ\"","category":"Специалист","city":"Шахтерск","schedule":"Полный день","experience":"3-6 лет","demand":1,"links":[],"key_skills":["Картография"],"recruiter":"Сидоренко Татьяна Владимировна","recruiter_email":"sidorenkotv@eastmining.ru","department":"ООО \"УМПШ\"","director":"Лопарев Сергей Владимирович"},{"id":1535638,"name":"Батяня (Проект по СВО)","description":"","responsibilities":"<p><strong><span>Лидер организации сообщества ветеранов / \"Батяня\"</span></strong></p><p><strong>Локация:</strong> Южно-Сахалинск или Шахтерск</p><p><strong>Прямое подчинение:</strong> ТОП-менеджмент компании (Босой или Бородин).</p><h3>О ПРОЕКТЕ</h3><p>ВГК — это 5000 сотрудников и ответственность за весь Углегорский район. Мы понимаем: возвращение бойцов к мирной жизни не решается выплатами. Оно решается через <strong>смысл, команду и новую профессию</strong>. Мы запускаем комплексную программу ресоциализации, основанную на лучших мировых практиках по работе с ветеранами военных действий. Нам нужен человек, который возглавит этот процесс на месте и станет для ветеранов настоящим «отцом-командиром».</p><p><br>ТВОЯ МИССИЯ</p><p>Выстроить «Маршрут возвращения» для бойцов: от первой встречи до закрепления в новой профессии на предприятиях ВГК. Ты должен стать мостом между боевым прошлым человека и его стабильным трудовым будущим.</p><h3>ЧТО НУЖНО БУДЕТ ДЕЛАТЬ (ЗАДАЧИ)</h3><ul><li><strong>Стать лицом программы:</strong> Проводить установочные встречи, объяснять правила «Контракта взаимных обязательств» (мы даем обучение и работу — боец дает дисциплину и готовность расти).</li><li><strong>Сформировать сообщество:</strong> Организовать «Ветеран-центр» как точку сборки. Создать атмосферу «свои среди своих», где есть структура и взаимовыручка.</li><li><strong>Управлять треками адаптации:</strong> Совместно с HR и производством курировать переобучение ветеранов на востребованные в ВГК профессии (водители большегрузов, механики, операторы).</li><li><strong>Реализовывать «Проекты со смыслом»:</strong> Организовать участие ветеранов в жизни района (помощь семьям погибших, благоустройство, наставничество) — работа через действие, а не через пособия.</li><li><strong>Держать дисциплину:</strong> Быть фильтром на входе. Отсеивать тех, кто не готов, и поддерживать тех, кто хочет выбраться.</li></ul><h3>КТО ТЫ</h3><ul><li><strong>Мужчина с реальным боевым опытом.</strong> Ты говоришь с ветеранами на одном языке, знаешь, что такое ПТСР и дезадаптация не по учебникам.</li><li><strong>Офицер (полковник / подполковник в запасе).</strong> Тебе не нужно объяснять, что такое субординация, ответственность за личный состав и управление ресурсами.</li><li><strong>Управленец.</strong> Ты умеешь планировать, отчитываться за результат и взаимодействовать с гражданскими структурами (GR).</li><li><strong>Твоя мотивация</strong> — не просто «занять должность», а реально помочь ветерану найти себя в мирной жизни под крылом сильного работодателя.</li></ul><h3>ЧТО МЫ ПРЕДЛАГАЕМ</h3><ul><li><strong>Ресурс крупнейшего холдинга:</strong> У тебя будет бюджет, пространство для центра, поддержка службы безопасности и учебного комбината ВГК.</li><li><strong>Работа на результат:</strong> Мы не требуем пафосных отчетов. Нам нужны люди, которые вышли на смены и закрепились в семьях.</li><li><strong>Масштаб:</strong> Пилот в Углегорске должен стать федеральным стандартом. Ты будешь тем, кто его создал.</li><li><strong>Условия:</strong> Достойный уровень дохода (обсуждается индивидуально), полная поддержка при релокации на Сахалин, жилье и служебный транспорт.</li></ul><hr><h3>ПОЧЕМУ ЭТО ВАЖНО</h3><p>Мы инвестируем в возвращение Людей к нормальной жизни. Если ты готов взять ответственность за «Вторую смену» наших героев — мы ждем тебя.</p><p>С 0 создать Сообщество Ветеранов.</p><p>Развитие карьерных треков, создание условий для социализации ребят прошедших СВО.</p><p>Психологическая реабилитация, мотивация на развитие ребят.</p><p>Поддержка ребят прошедших СВО.</p><p>Смотрят кандидатов : Босой и Бородин.</p><h3><span>1. Мотивация и личная вовлечённость</span></h3><ul><li><span>Почему вы хотите возглавить Совет ветеранов? Что для вас значит эта работа?</span></li><li><span>Имеете ли вы личный опыт (военная служба, работа с ветеранами, семья ветеранов)? Как это повлияло на ваше отношение к теме?</span></li></ul><h3><span>2. Лидерские и организационные навыки</span></h3><ul><li><span>Какой у вас опыт руководства коллективами?</span></li><li><span>Как вы будете выстраивать работу с неоднородной группой (ветераны разных родов войск, возрастов, состояния здоровья)?</span></li><li><span>Приведите пример, когда вам удалось сплотить группу вокруг общей цели.</span></li><li><span>Как будете распределять обязанности между членами Совета? Как мотивировать волонтёров?</span></li></ul><br><h3><span>3. Работа с проблемами ветеранов</span></h3><ul><li><span>Какие, на ваш взгляд, главные проблемы ветеранов в нашем регионе/организации?</span></li><li><span>Как будете отстаивать интересы ветеранов перед администрацией, органами власти, работодателями?</span></li><li><span>Как подойдёте к решению конфликтной ситуации между ветеранами или между ветераном и администрацией?</span></li></ul><br><h3><span>4. Организация деятельности Совета</span></h3><ul><li><span>Какие мероприятия считаете приоритетными (памятные даты, соцподдержка, досуг, медпомощь)?</span></li><li><span>Как будете вести документацию, планирование, отчётность Совета?</span></li></ul><ul><li><span>Какие каналы коммуникации предложите для связи с членами Совета (особенно маломобильными)?</span></li></ul><br><h3><span>5. Работа с внешними структурами</span></h3><ul><li><span>Какой у вас опыт взаимодействия с администрацией, соцзащитой, волонтёрскими организациями?</span></li><li><span>Как будете привлекать ресурсы ( гранты, волонтёры)?</span></li><li><span>Как организуете подготовку документов для получения льгот/поддержки для конкретных ветеранов?</span></li></ul><h3><span>7. Видение развития</span></h3><ul><li><span>Каким вы видите Совет ветеранов через год при вашем руководстве?</span></li><li><span>Какие новые форматы работы с ветеранами хотели бы внедрить?</span></li><li><span>Как будете сохранять преемственность и передавать опыт новым поколениям?</span></li></ul><br><hr><br><strong><span>Рекомендация:</span></strong><span> Обратите внимание на:</span><ul><li><span>Эмпатию и уважение к разным поколениям</span></li><li><span>Практическую смекалку (часто ресурсов мало — нужны креативные решения)</span></li><li><span>Стрессоустойчивость (работа с an>руководителей<span>. </span></span></li><li><span>Владение современными форматами оценки руководителей (ассессменты, ИИ решения)</span></li><li><span><span>Опыт реализации программ для кадрового резерва (Top Talents) длительностью от 6+ месяцев. </span><br><br></span></li></ol><p>Важные компетенции:</p><ol><li><strong>Системное мышление:</strong> видеть картину целиком - выстраивать систему обучения развития руководителей</li><li><strong>Управление стейкхолдерами:</strong> уметь выстраивать коммуникацию и вовлекать стейкхолдеров, создавать видимость проектов</li><li><strong>Стрессоустойчивость:</strong> готовность работать в высоком темпе и над несколькими проектами одновременно</li><li><strong>Agile формат работы:</strong> готовность работать по OKR и спринтам.</li><li><strong>Инновационность: </strong>уметь искать лучшие практики и изобретать кастомные решения</li></ol>","entity":"ООО \"ВГК\"","category":"Специалист","city":"Южно-Сахалинск","schedule":"Удалённо","experience":"3-6 лет","demand":1,"links":[],"key_skills":[],"recruiter":"Домашинская Марина Викторовна","recruiter_email":"domashinskayamv@eastmining.ru","department":"ООО \"ВГК\"","director":"Ульянова Екатерина Андреевна"},{"id":1541699,"name":"Директор по внутренней складской логистике #Ситников #ГД","description":"","responsibilities":"<p><strong>Цель роли</strong></p><p>Обеспечить системное, прозрачное и управляемое функционирование складского хозяйства с минимальными потерями, высокой точностью учета и едиными стандартами операционной деятельности на базе современных процессов и автоматизированных систем.</p><p><strong><br>Ключевые задачи</strong></p><p><strong>1. Наведение порядка и управляемости складской сети:</strong> переход от «хаоса» к контролируемой системе управления складами, обеспечение прозрачности процессов.</p><p><strong>2. Точность учета и борьба с потерями: </strong>системное снижение уровня недостач до нормативных значений (например, &lt; 0,5% от оборота);</p><ul><li>Внедрение кон ки зрения промбезопасности.</p>","requirements":"<p>Высшее техническое образование, приоритет - горное, электротехническое;</p><p>Уверенное знание законодательных и нормативных правовых актов в области промышленной и пожарной безопасности, БДД;</p><p>Опыт работы на аналогичной должности на промышленных предприятиях от 3-х лет.</p><p>Реальный опыт управления командой, реальный опыт на крупных предприятиях с динамичными процессами, понимание процесса взаимодействия с производством.</p><p>Умение работать с компьютером. </p><p>Уверенный пользователь пакета MS Office.</p><p>Личные качества: ответственность, управленческие навыки, способность работать в быстром темпе.</p><p>Горняк - приоритет.</p>","entity":"ООО \"СУР\"","category":"Руководитель","city":"Углегорск","schedule":"Полный день","experience":"3-6 лет","demand":1,"links":[],"key_skills":["Руководство коллективом","Стрессоустойчивость","Лидерство","Командообразование","Разработка ППР","Промышленная безопасность","Безопасность"],"recruiter":"Жидина Наталья Васильевна","recruiter_email":"zhidinanv@eastmining.ru","department":"ООО \"СУР\"","director":"Братеньков Евгений Владимирович"},{"id":1543408,"name":"Инженер-гидрогеолог","description":"","responsibilities":"<p><span>Выполняет комплекс гидрогеологических и инженерно-геологических исследований при изучении недр, решении проектно-изыскательских и других инженерных задач.</span></p><p><span>Участвует в разработке плановой и проектно-сметной документации, а также в организации и ликвидации полевых работ.</span></p><p><span>Принимает участие в полевых работах для получения фактического материала по геологии, гидрогеологии и инженерной геологии изучаемого района.</span></p><p><span>Организует и проводит гидрогеологические наблюдения на сети режимных и наблюдательных скважин, действующих водозаборах, а также при поисках и разведке подземных вод.</span></p><p><span>Осуществляет одиночные и кустовые откачки воды из скважин, отбор проб воды и грунтов для лабораторных исс й.</p><p>5.   Проверка наличия у машинистов подрядных организаций соответствующих документов (удостоверений, путевых листов, журналов, предрейсовых медицинских осмотров).</p><p><strong>6.   Взаимодействие с подрядчиками:</strong></p><p>6.1. Ведение рабочей переписки по вопросам, входящих в компетенцию УКРПО.</p><p>6.2. Участие в очных встречах и переговорах для решения текущих вопросов.</p><p>6.3. Проведение предварительной претензионной работы.</p><p><strong>7.   Взаимодействие с внутренними подразделениями:</strong></p><p>7.1. С договорным отделом – по вопросам заключения договоров, контроля оплаты.</p><p>7.2. С бухгалтерией и ПЭО – для согласования первичных документов перед оплатойи сверки данных.</p><p>7.3. С Юридическим отделом – для организации прете��зионной работы.</p><p>7.4. С отделом ОТ и ПБ – для совместных проверок соблюдения подрядчиками требований безопасности.</p><p><strong>8.   Административно-управленческие функции (в рамках управления личным составом УКРПО и договорного отдела):</strong></p><p>8.1. Распределение обязанностей, контроль работы подчинённых.</p><p>8.2. Участие в подборе кадров, составление графика отпусков.</p><p>8.3. Разработка должностных инструкций специалистов подразделения.</p>","requirements":"<p>Образование:</p><p>Дополнительная квалификация:</p><p>Опыт работы:</p>","entity":"ООО \"СУР\"","category":"Руководитель","city":"Шахтерск","schedule":"Полный день","experience":"3-6 лет","demand":1,"links":[{"url":"https://hh.ru/vacancy/130907922","type":"Headhunter"}],"key_skills":[],"recruiter":"Сидоренко Татьяна Владимировна","recruiter_email":"sidorenkotv@eastmining.ru","department":"ООО \"СУР\"","director":"Биденко Александр Александрович"},{"id":1549027,"name":"Заместитель начальника отдела охраны окружающей среды","description":"","responsibilities":"<p>Руководит разработкой и внедрением мероприятий, направленных на выполнение требований экологического законодательства по соблюдению стандартов и нормативов в области охраны окружающей среды, рационального использования природных ресурсов, создания экономики замкнутого цикла при проектировании, строительстве и эксплуатации новых объектов предприятия, а также расширении и реконструкции действующих производств.</p><p>Организует составление перспективных и текущих планов по охране окружающей среды, осуществляет контроль за их выполнением.</p><p>Принимает участие в разработке мер по обеспечению экологической чистоты выпускаемой продукции, ее безопасности для потребителей, созданию новых товаров и технологических процессов с улучшенными экологическими характеристиками.</p><p>Обеспечивает проведение экологической экспертизы технико-экономических обоснований, проектов, а также создаваемых новых технологий и оборудования, внедрение систем экологической маркировки продукции предприятия.</p><p>Руководит разработкой экологических стандартов и нормативов предприятия в соответствии с действующими государственными, международными (региональными) и отраслевыми стандартами, обеспечивает контроль за их выполнением и своевременный пересмотр.</p><p>Контролирует правильность эксплуатации очистных и защитных сооружений.</p><p>Разрабатывает меры по предотвращению загрязнения окружающей среды, соблюдению экологических норм, обеспечивающих благоприятные условия труда, а также по предупреждению возможности аварий и катастроф.</p><p>Участвует в разработке планов внедрения новой техники, проведения научно-исследовательских и опытных работ по созданию на предприятии экономики замкнутого цикла, основанной на экологически рациональной циркуляции материалов, сбережении и замещении невозобновляемых ресурсов, минимизации, повторном использовании, переработке и утилизации отходов, внедрении малоотходной, безотходной и экологически чистой технологии производства, рациональному использованию природных ресурсов, а также разработке планов капитального строительства по природоохранным объектам.</p><p>Проводит обоснованный расчет рисков для состояния окружающей среды при реализации тен и оборудования на кухне, в моечной, складах и подсобных помещениях от жира и загрязнений.</li><li><strong>Дезинфекция:</strong> Регулярная обработка контактных поверхностей (столы, ручки, техника) специализированными средствами по графику СанПиН.</li><li><strong>Санитарная обработка санзон:</strong> Ежедневная уборка туалетов и раздевалок для персонала, а также контроль наличия и пополнение расходных материалов (мыло, бумага).</li><li><strong>Работа с отходами:</strong> Сбор, сортировка и своевременный вынос мусора, поддержание чистоты мусорных баков.</li><li><strong>Контроль и хозяйственные задачи:</strong> Наблюдение за состоянием моечного и уборочного оборудования (своевременное сообщение о неполадках). Чистка, дезинфекция и правильное хранение уборочного инвентаря, контроль запаса моющих средств.</li><li><strong>Соблюдение стандартов:</strong> Строгое выполнение утверждённых графиков уборки, обязательное использование средств индивидуальной защиты (СИЗ) и обеспечение безопасности (установка знаков «Мокрый пол»).</li></ul>","requirements":"<p>Образование: не ниже среднего</p><p>Дополнительная квалификация: нет</p><p>Опыт работы: от 1 года</p>","entity":"ООО \"ВГК Сервис\"","category":"Рабочий","city":"Шахтерск","schedule":"Полный день","experience":"1-3 года","demand":2,"links":[],"key_skills":[],"recruiter":"Явтушенко Ирина Андреевна","recruiter_email":"yavtushenkoia@eastmining.ru","department":"ООО «ВГК Сервис»","director":"Кузнецова Любовь Игоревна"},{"id":1582156,"name":"Контент‑менеджер / SMM‑специалист (HR‑бренд, Employer Branding) #HR","description":"","responsibilities":"Контент‑менеджер / SMM‑специалист (HR‑бренд, Employer Branding)Цель роли: Рост узнаваемости бренда работодателя ВГК и притока кандидатов через сильный «живой» контент и стабильный контент‑продакшн.","requirements":"<h3>Образование</h3><ul><li>Высшее/среднее профессиональное: маркетинг/журналистика/PR/медиа/HR/социология — как плюс.</li><li>Допускается профиль «не по диплому», если есть сильное портфолио и кейсы.</li></ul><h3>Дополнительная квалификация (желательно)</h3><ul><li>SMM/контент‑стратегия, видеопродакшн, сторителлинг, интервью.</li><li>Аналитика соцсетей, performance для контента, работа с HR‑воронкой (бренд работодателя).</li></ul><h3>Опыт работы</h3><ul><li>1–3 года в SMM/контенте/видео (идеально — HR‑бренд, корпоративные коммуникации, медиа, производство/промышленность).</li><li>Обязателен опыт регулярного выпуска видео‑контента (Reels/Clips/shorts) и ведения площадок.</li><li>Плюс: опыт работы «в полях» (репортаж, съёмка на объектах, интервью).</li></ul><hr><h3>Чем предстоит заниматься</h3><ul><li>Управление каналами: ведение карьерных страниц в ВК, MAX, блогов на <span>vc.ru</span>, Дзен, карьерного сайта, тест и запуск новых площадок.</li><li>Контент‑продакшн полного цикла (в паре с другим SMM-специалистом): идеи → сценарии → съёмка на объектах/в офисе → монтаж → публикация. «Живой» контент вместо стоков.</li><li>Амбассадор / лицо бренда: работа в кадре, интервью с сотрудниками, объяснение сложного простыми словами, создание доверия к компании.</li><li>Креатив и вовлечение: контент, который обсуждают; рост ER и вовлечения; уход от шаблонных «мы открыли вакансию».</li><li>Data‑driven: аналитика метрик (охваты, удержание, ER, переходы), понимание влияния контента на HR‑воронку (интерес → отклик → найм).</li><li>Постоянный upgrade: идеи по трендам и форматам, предложения «как сделать лучше» и тестирование гипотез.</li></ul><hr><h3>Что мы ждём от тебя</h3><ul><li>Портфолио обязательно: ссылки на видео (Reels/Clips) + тексты/кейсы (особенно <span>vc.ru</span>/Дзен).</li><li>Hard skills: уверенный мобильный монтаж (CapCut/VN/и др.), базовый дизайн (Figma/Canva/Adobe — что используешь), понимание света/звука/кадра.</li><li>Аналитика: умение собирать отчёты, делать выводы и предлагать действия (не просто «сколько лайков»).</li><li>Коммуникации и камера: не боишься людей и объектива, умеешь быстро располагать к себе.</li><li>Без шаблонов: department":"ООО \"ВГК\"","director":"Загривко Дмитрий Сергеевич"},{"id":1586373,"name":"Руководитель внутреннего аудита, контроля и управления рисками #ГД","description":"","responsibilities":"<p><strong>Команда:</strong> 2 человека</p><p><strong>Подчинение:</strong> Генеральный директор</p><h1>Коротко</h1><p>Это не роль “проверяющего”.</p><p>Это роль, которая обеспечивает:</p><p><strong>видимость рисков → изменение процессов → снижение потерь.</strong></p><h1>Почему ищем</h1><p>Функция существует, но системы нет. Текущий руководитель собирает отчёты, но не производит ценность: уходит от ответственности, не расставляет приоритеты, не влияет на решения. Реакция вместо проактивности. Документирование вместо изменений.<br> Ищем человека, который построит систему, и будет нести за неё ответственность.<br></p><h1>Миссия роли</h1><p>Обеспечить прозрачность рисков, надёжность процессов и снижение потерь через:</p><ul><li>независимый внутренний аудит</li><li>работающую систему внутреннего контроля</li><li>системное управление рисками</li></ul><p>Главный результат: <strong>риски выявляются заранее, отклонения становятся видимыми сразу, процессы реально меняются</strong>.</p><h1>Задачи</h1><h2>1. Внутренний аудит (независимая функция)</h2><p>Построить и вести функцию внутреннего аудита на основе risk-based подхода:</p><ul><li>Формировать план аудитов от рисков, а не по формальному графику</li><li>Проводить аудиты ключевых процессов: производство, логистика, закупки, финансы, IT, HR</li><li>Оценивать:<ul><li>достаточность и эффективность контролей</li><li>причины отклонений</li><li>риск потерь и их масштаб</li></ul></li></ul><p>Результат аудита:</p><ul><li>описание риска и сценария его реализации</li><li>корневая причина</li><li>оценка ущерба (в деньгах или значимости)</li><li>конкретные изменения в процессе</li></ul><p>Не допускается:</p><ul><li>фиксация нарушений без анализа причин</li><li>рекомендации уровня “усилить контроль”</li></ul><p>Аудит не внедряет изменения, но добивается их через контроль исполнения и эскалацию.</p><h2>2. Система внутреннего контроля</h2><p>Выстроить систему контролей, встроенных в процессы:</p><ul><li>Определить ключевые контрольные точки в:<ul><li>закупках</li><li>производстве</li><li>логистике</li><li>финансах</li></ul></li><li>Обеспечить, что каждый контроль:<ul><li>встроен в процесс (а не существует в регламенте)</li><li>проверяем и измерим</li><li>по возможности автоматизирован</li></ul></li></ul><p>Примеры:</p><ul><li>контроль отклонений от производственных параметров</li><li>контроль превышения лимитов</li><li>контроль аномалий в данных</li><li>контроль соблюдения процедур закупок</li></ul><p>Контроль считается существующим только если:</p><ul><li>он реально выполняется</li><li>отклонение фиксируется и приводит к реакции</li></ul><h2>3. Управление рисками (ERM)</h2><p>Построить систему управления рисками компании:</p><ul><li>Сформировать реестр ключевых рисков (20–30):<ul><li>описание сценария</li><li>вероятность</li><li>ущерб</li><li>текущие меры контроля</li></ul></li><li>Назначить владельцев рисков из операционного менеджмента</li><li>Обеспечить приоритизацию (топ-риски — на уровне ГД)</li><li>Вести регулярный пересмотр и актуализацию</li></ul><p>Создать понятную отчётность:</p><ul><li>карта рисков (heatmap)</li><li>динамика рисков</li><li>статус мер</li></ul><h2>4. Управление корректирующими мероприятиями</h2><p>Перезапустить систему корректирующих мероприятий:</p><ul><li>Единый реестр мероприятий</li><li>Прозрачный статус и контроль исполнения</li></ul><p>Принцип:</p><p>мероприятие считается закрытым только если:</p><ul><li>устранена корневая причина</li><li>изменён процесс</li><li>подтверждён эффект</li></ul><h2>5. Проактивное выявление рисков и отклонений</h2><p>Обеспечить выявление проблем до инцидентов:</p><ul><li>Использовать:<ul><li>данные и аналитику</li><li>наблюдение процессов</li><li>сигналы от сотрудников</li></ul></li><li>Приходить:<ul><li>с выявленной проблемой</li><li>с предложенным решением</li><li>до того, как проблема стала инцидентом</li></ul></li></ul><h2>6. Культура и влияние</h2><ul><li>Сформировать культуру внутреннего контроля и управления рисками</li><li>Обеспечить понимание сотрудниками:<ul><li>зачем существуют правила</li><li>как они связаны с потерями и эффективностью</li></ul></li><li>Выступать “голосом риска” при принятии решений на уровне ГД и СД</li><li>Добиваться изменений через аргументы, данные и эскалацию</li></ul><h1>KPI</h1><ul><li>Финансовый эффект: выявленные и предотвращённые потери</li><li>Покрытие рисков: % ключевых рисков с владельцами и мерами</li><li>Качество мер: % мероприятий, реально изменивших процесс</li><li>Эффективность контролей: % критичных процессов с работающими контролями</li><li>Проактивность: доля выявленных проблем до инцидента</li><li>Скорость реакции: время от выявления до решения</li></ul>","requirements":"<h1>Профиль</h1><ul><li>8–10+ лет в аудите / риск-менеджменте / внутреннем контроле</li><li>3–4 года на руководящей роли</li><li>Опыт внутри крупной компании обязателен (не только консалтинг)</li><li>Big4 как база — плюс, при наличии операционного опыта</li></ul><p>Ключевые качества:</p><ul><li>Берёт на себя ответственность - не ищет владельца процесса, которому можно передать ответственность. Если видит проблему - она его, пока не решена.</li><li>Проактивен - сам определяет, что важно проверить. Приходит с проблемой раньше, чем она стала инцидентом.</li><li>Держит позицию под давлением - говорит неудобную правду и не меняет её, когда получает сопротивление. Отличает «я убеждён новым аргументом» от «меня продавили».</li><li>Умеет влиять без формальных полномочий - добивается изменений через доверие, аргументы и эскалацию, а не через приказ.</li><li>Видит и устраняет причины, а не симптомы - не фиксирует нарушение, а закрывает его причину.</li><li>работает с цифрами и данными</li></ul><h1>Чего не должно быть</h1><ul><li>ориентация на отчёты вместо изменений</li><li>закрытие замечаний “на бумаге”</li><li>формализм и бюрократия</li><li>страх конфликта с операционным менеджментом</li><li>подход “нет регламента — не могу”</li></ul><h1>Красные флаги</h1><ul><li>не может привести конкретные кейсы влияния на процессы</li><li>говорит о стандартах, но не о результатах</li><li>опыт только в консалтинге</li><li>путает закрытое замечание с устранённой причиной</li></ul><p>уходит от конкретики в вопросах конфликтов и давления</p>","entity":"ООО \"ВГК\"","category":"Руководитель","city":"Москва","schedule":"Полный день","experience":"Более 6 лет","demand":1,"links":[],"key_skills":[],"recruiter":"Карина Газизуллина","recruiter_email":"gazizullinakr@eastmining.ru","department":"ООО \"ВГК\"","director":"Куземченко Максим Николаевич"}];

function render(list){

    var ir="";

    out+='<div class="job-card" onclick="tog('+i+')">';
    out+='<h2>'+h(j.name)+'</h2>';

    if(j.city)out+='<span class="tag tag-city">'+h(j.city)+'</span>';
    if(j.schedule)out+='<span class="tag tag-schedule">'+h(j.schedule)+'</span>';
    out+='</div>';

    out+='</div></div>';

}
